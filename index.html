<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>자동차보험 실적 대시보드</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.1/dist/chart.umd.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/xlsx@0.18.5/dist/xlsx.full.min.js"></script>
<style>
:root {
  --bg: #06080f;
  --bg2: #0c1020;
  --bg3: #111630;
  --bg4: #161c3e;
  --bg5: #1c2348;
  --border: rgba(99,102,241,.12);
  --border2: rgba(99,102,241,.25);
  --accent: #818cf8;
  --accent2: #a5b4fc;
  --green: #34d399;
  --green2: #6ee7b7;
  --red: #f87171;
  --red2: #fca5a5;
  --yellow: #fbbf24;
  --yellow2: #fde68a;
  --cyan: #22d3ee;
  --text: #e2e8f0;
  --text2: #94a3b8;
  --text3: #64748b;
  --gold: #fbbf24;
  --card-radius: 14px;
  --shadow: 0 4px 24px rgba(0,0,0,.4);
  --shadow2: 0 2px 8px rgba(0,0,0,.3);
}
* { margin:0; padding:0; box-sizing:border-box; }
body {
  font-family: 'Noto Sans KR', sans-serif;
  background: var(--bg);
  color: var(--text);
  min-height: 100vh;
  -webkit-font-smoothing: antialiased;
}
/* Scrollbar */
::-webkit-scrollbar { width: 6px; height: 6px; }
::-webkit-scrollbar-track { background: transparent; }
::-webkit-scrollbar-thumb { background: var(--border2); border-radius: 3px; }

/* === HEADER === */
.hdr {
  background: linear-gradient(180deg, var(--bg2) 0%, var(--bg) 100%);
  border-bottom: 1px solid var(--border);
  padding: 16px 20px 0;
  position: sticky; top: 0; z-index: 100;
}
.hdr-top {
  display: flex; align-items: center; justify-content: space-between;
  margin-bottom: 8px;
}
.hdr-title {
  font-size: 18px; font-weight: 700;
  background: linear-gradient(135deg, var(--accent2), var(--cyan));
  -webkit-background-clip: text; -webkit-text-fill-color: transparent;
  letter-spacing: -0.5px;
}
.hdr-sub {
  font-size: 11px; color: var(--text3); margin-bottom: 10px;
}
.hdr-actions {
  display: flex; gap: 8px; align-items: center;
}
.hdr-actions button {
  background: var(--bg3); border: 1px solid var(--border);
  color: var(--text2); font-size: 12px; padding: 6px 12px;
  border-radius: 8px; cursor: pointer; font-family: inherit;
  transition: all .2s;
  display: flex; align-items: center; gap: 5px;
}
.hdr-actions button:hover { background: var(--bg4); color: var(--text); border-color: var(--border2); }

/* Nav row */
.nav-row {
  display: flex; align-items: center; justify-content: space-between;
  margin-bottom: 0;
}
.month-nav {
  display: flex; align-items: center; gap: 4px;
}
.month-nav button {
  background: none; border: 1px solid var(--border);
  color: var(--text2); width: 30px; height: 30px;
  border-radius: 8px; cursor: pointer; font-size: 14px;
  display: flex; align-items: center; justify-content: center;
  transition: all .2s;
}
.month-nav button:hover { background: var(--bg4); color: var(--text); }
.month-nav .cur-month {
  font-size: 14px; font-weight: 600; color: var(--text);
  min-width: 80px; text-align: center;
}
.month-nav .btn-latest {
  width: auto; padding: 0 10px; font-size: 11px; margin-left: 4px;
}

/* Tabs */
.tabs {
  display: flex; gap: 0; border-bottom: none;
}
.tab-btn {
  background: none; border: none; color: var(--text3);
  font-size: 13px; font-weight: 500; padding: 10px 16px;
  cursor: pointer; font-family: inherit;
  border-bottom: 2px solid transparent;
  transition: all .2s; white-space: nowrap;
}
.tab-btn:hover { color: var(--text2); }
.tab-btn.active {
  color: var(--accent); border-bottom-color: var(--accent);
  font-weight: 600;
}

/* === UPLOAD BAR === */
.upload-bar {
  background: var(--bg2);
  border-bottom: 1px solid var(--border);
  padding: 10px 20px;
  display: flex; align-items: center; gap: 12px;
  flex-wrap: wrap;
}
.upload-btn {
  background: linear-gradient(135deg, var(--accent), #6366f1);
  color: #fff; border: none; padding: 7px 14px;
  border-radius: 8px; cursor: pointer; font-size: 12px;
  font-weight: 600; font-family: inherit;
  transition: all .2s; display: flex; align-items: center; gap: 5px;
}
.upload-btn:hover { filter: brightness(1.15); transform: translateY(-1px); }
.upload-btn:active { transform: translateY(0); }
#upload-input { display: none; }
#upload-status {
  font-size: 11px; color: var(--text3);
  flex: 1; min-width: 100px;
}
.data-badges {
  display: flex; gap: 6px;
}
.badge {
  font-size: 10px; padding: 3px 8px; border-radius: 20px;
  font-weight: 600; letter-spacing: .3px;
}
.badge-m { background: rgba(129,140,248,.15); color: var(--accent); border: 1px solid rgba(129,140,248,.25); }
.badge-d { background: rgba(52,211,153,.15); color: var(--green); border: 1px solid rgba(52,211,153,.25); }

/* === CONTENT === */
.ct {
  padding: 20px;
  max-width: 1400px;
  margin: 0 auto;
  min-height: calc(100vh - 160px);
}

/* === KPI CARDS === */
.kpi-grid {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
  gap: 12px;
  margin-bottom: 20px;
}
.kpi {
  background: linear-gradient(145deg, var(--bg3), var(--bg4));
  border: 1px solid var(--border);
  border-radius: var(--card-radius);
  padding: 16px;
  position: relative;
  overflow: hidden;
  transition: all .3s;
}
.kpi:hover { border-color: var(--border2); transform: translateY(-2px); box-shadow: var(--shadow); }
.kpi.kpi-primary {
  border-color: rgba(251,191,36,.2);
  background: linear-gradient(145deg, rgba(251,191,36,.06), var(--bg4));
}
.kpi.kpi-primary:hover { border-color: rgba(251,191,36,.4); }
.kpi-label {
  font-size: 11px; color: var(--text3); font-weight: 500;
  margin-bottom: 6px; display: flex; align-items: center; gap: 4px;
}
.kpi-value {
  font-size: 22px; font-weight: 700; color: var(--text);
  line-height: 1.2;
}
.kpi-primary .kpi-value { color: var(--gold); }
.kpi-change {
  display: flex; gap: 8px; margin-top: 6px; flex-wrap: wrap;
}
.kpi-change span {
  font-size: 11px; font-weight: 500;
  display: flex; align-items: center; gap: 2px;
}
.kpi-change .up { color: var(--green); }
.kpi-change .down { color: var(--red); }
.kpi-change .neutral { color: var(--text3); }
.kpi-change .label { color: var(--text3); font-weight: 400; }
.pred-badge {
  position: absolute; top: 10px; right: 10px;
  font-size: 9px; font-weight: 700;
  background: rgba(251,191,36,.15); color: var(--yellow);
  padding: 2px 6px; border-radius: 4px;
  letter-spacing: .5px;
}

/* === CARDS & SECTIONS === */
.card {
  background: linear-gradient(145deg, var(--bg3), var(--bg4));
  border: 1px solid var(--border);
  border-radius: var(--card-radius);
  padding: 20px;
  margin-bottom: 16px;
}
.card-title {
  font-size: 13px; font-weight: 600; color: var(--text);
  margin-bottom: 14px;
  display: flex; align-items: center; justify-content: space-between;
}
.card-title .sub { font-size: 11px; color: var(--text3); font-weight: 400; }

/* Range buttons */
.range-btns {
  display: flex; gap: 4px;
}
.range-btn {
  background: var(--bg2); border: 1px solid var(--border);
  color: var(--text3); font-size: 11px; padding: 4px 10px;
  border-radius: 6px; cursor: pointer; font-family: inherit;
  transition: all .2s;
}
.range-btn:hover { background: var(--bg4); color: var(--text2); }
.range-btn.active { background: var(--accent); color: #fff; border-color: var(--accent); }

/* Filter buttons */
.filter-btns {
  display: flex; gap: 4px; flex-wrap: wrap; margin-bottom: 14px;
}
.filter-btn {
  background: var(--bg2); border: 1px solid var(--border);
  color: var(--text3); font-size: 11px; padding: 5px 12px;
  border-radius: 8px; cursor: pointer; font-family: inherit;
  transition: all .2s;
}
.filter-btn:hover { background: var(--bg4); color: var(--text2); }
.filter-btn.active { background: rgba(129,140,248,.15); color: var(--accent); border-color: rgba(129,140,248,.35); }

/* Chart containers */
.chart-row {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 16px;
  margin-bottom: 16px;
}
.chart-wrap {
  position: relative;
  height: 280px;
}
.chart-full { height: 320px; }

/* === TABLES === */
.tbl-wrap {
  overflow-x: auto;
  border-radius: 10px;
  border: 1px solid var(--border);
}
table {
  width: 100%; border-collapse: collapse;
  font-size: 12px;
}
thead th {
  background: var(--bg2);
  color: var(--text2); font-weight: 600;
  padding: 10px 12px;
  text-align: right;
  white-space: nowrap;
  border-bottom: 1px solid var(--border);
  position: sticky; top: 0; z-index: 1;
}
thead th:first-child { text-align: left; }
tbody td {
  padding: 9px 12px;
  text-align: right;
  border-bottom: 1px solid rgba(255,255,255,.03);
  white-space: nowrap;
  color: var(--text2);
}
tbody td:first-child { text-align: left; color: var(--text); font-weight: 500; }
tbody tr:hover { background: rgba(129,140,248,.04); }
tbody tr.pred-row { background: rgba(251,191,36,.04); }
tbody tr.pred-row td:first-child::after {
  content: '예측';
  font-size: 9px; color: var(--yellow);
  background: rgba(251,191,36,.12); padding: 1px 5px;
  border-radius: 3px; margin-left: 6px; font-weight: 600;
}
.tbl-up { color: var(--green) !important; }
.tbl-down { color: var(--red) !important; }

/* === EMPTY STATE === */
.empty-state {
  text-align: center; padding: 80px 20px;
  color: var(--text3);
}
.empty-state .icon { font-size: 48px; margin-bottom: 16px; opacity: .5; }
.empty-state .title { font-size: 16px; font-weight: 600; color: var(--text2); margin-bottom: 8px; }
.empty-state .desc { font-size: 13px; line-height: 1.6; max-width: 400px; margin: 0 auto; }

/* === FORECAST CARDS === */
.forecast-grid {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
  gap: 14px;
  margin-bottom: 20px;
}
.fc-card {
  background: linear-gradient(145deg, var(--bg3), var(--bg4));
  border: 1px solid rgba(251,191,36,.15);
  border-radius: var(--card-radius);
  padding: 18px;
  position: relative;
}
.fc-card .fc-month {
  font-size: 14px; font-weight: 700; color: var(--yellow);
  margin-bottom: 12px;
}
.fc-card .fc-amount {
  font-size: 24px; font-weight: 700; color: var(--text);
  margin-bottom: 4px;
}
.fc-card .fc-change {
  font-size: 12px; margin-bottom: 14px;
}
.fc-card .fc-detail {
  display: grid; grid-template-columns: 1fr 1fr; gap: 8px;
}
.fc-card .fc-detail-item {
  background: rgba(0,0,0,.2); border-radius: 8px; padding: 10px;
}
.fc-detail-item .dl { font-size: 10px; color: var(--text3); margin-bottom: 2px; }
.fc-detail-item .dv { font-size: 14px; font-weight: 600; color: var(--text); }
.fc-method {
  position: absolute; top: 12px; right: 14px;
  font-size: 9px; padding: 3px 8px; border-radius: 4px;
  font-weight: 600; letter-spacing: .3px;
}
.fc-method.renewal { background: rgba(52,211,153,.12); color: var(--green); }
.fc-method.seasonal { background: rgba(129,140,248,.12); color: var(--accent); }
.fc-method.intra { background: rgba(251,191,36,.12); color: var(--yellow); }

/* Confidence indicator */
.confidence-bar {
  display: flex; align-items: center; gap: 6px;
  margin-top: 10px;
}
.confidence-bar .cb-label { font-size: 10px; color: var(--text3); white-space: nowrap; }
.confidence-bar .cb-track {
  flex: 1; height: 4px; background: rgba(255,255,255,.06);
  border-radius: 2px; overflow: hidden;
}
.confidence-bar .cb-fill { height: 100%; border-radius: 2px; transition: width .5s; }
.cb-high { background: var(--green); }
.cb-med { background: var(--yellow); }
.cb-low { background: var(--red); }

/* === ALERT CARDS === */
.alert-card {
  border-radius: 12px; padding: 14px 16px;
  margin-bottom: 10px;
  display: flex; align-items: flex-start; gap: 12px;
  border: 1px solid;
}
.alert-card.inc { background: rgba(52,211,153,.05); border-color: rgba(52,211,153,.2); }
.alert-card.dec { background: rgba(248,113,113,.05); border-color: rgba(248,113,113,.2); }
.alert-icon { font-size: 18px; flex-shrink: 0; padding-top: 2px; }
.alert-body { flex: 1; }
.alert-title { font-size: 13px; font-weight: 600; margin-bottom: 4px; }
.alert-card.inc .alert-title { color: var(--green); }
.alert-card.dec .alert-title { color: var(--red); }
.alert-desc { font-size: 12px; color: var(--text2); line-height: 1.5; }
.alert-meta { font-size: 10px; color: var(--text3); margin-top: 4px; }

/* === MODAL === */
.modal-overlay {
  position: fixed; inset: 0;
  background: rgba(0,0,0,.7);
  display: flex; align-items: center; justify-content: center;
  z-index: 1000;
  backdrop-filter: blur(4px);
  opacity: 0; visibility: hidden;
  transition: all .3s;
}
.modal-overlay.show { opacity: 1; visibility: visible; }
.modal {
  background: var(--bg3);
  border: 1px solid var(--border2);
  border-radius: 16px;
  padding: 28px;
  width: 90%; max-width: 420px;
  box-shadow: 0 20px 60px rgba(0,0,0,.6);
  transform: translateY(20px);
  transition: transform .3s;
}
.modal-overlay.show .modal { transform: translateY(0); }
.modal h3 {
  font-size: 16px; font-weight: 700; margin-bottom: 8px; color: var(--text);
}
.modal p {
  font-size: 12px; color: var(--text3); margin-bottom: 16px; line-height: 1.5;
}
.modal input {
  width: 100%; background: var(--bg); border: 1px solid var(--border2);
  border-radius: 10px; padding: 12px 14px;
  color: var(--text); font-size: 13px; font-family: inherit;
  outline: none; transition: border-color .2s;
}
.modal input:focus { border-color: var(--accent); }
.modal input::placeholder { color: var(--text3); }
.modal-btns {
  display: flex; gap: 8px; margin-top: 16px; justify-content: flex-end;
}
.modal-btns button {
  padding: 9px 20px; border-radius: 10px;
  font-size: 13px; font-weight: 600; cursor: pointer;
  font-family: inherit; border: none; transition: all .2s;
}
.btn-cancel { background: var(--bg); color: var(--text2); border: 1px solid var(--border) !important; }
.btn-cancel:hover { background: var(--bg2); }
.btn-primary { background: var(--accent); color: #fff; }
.btn-primary:hover { filter: brightness(1.1); }

/* === ONBOARDING === */
.onboard {
  text-align: center; padding: 60px 20px;
}
.onboard-icon {
  width: 80px; height: 80px;
  background: linear-gradient(135deg, rgba(129,140,248,.15), rgba(34,211,238,.1));
  border-radius: 24px; margin: 0 auto 20px;
  display: flex; align-items: center; justify-content: center;
  font-size: 36px;
  border: 1px solid var(--border);
}
.onboard h2 {
  font-size: 20px; font-weight: 700; margin-bottom: 8px;
  background: linear-gradient(135deg, var(--accent2), var(--cyan));
  -webkit-background-clip: text; -webkit-text-fill-color: transparent;
}
.onboard p { font-size: 13px; color: var(--text3); margin-bottom: 24px; max-width: 500px; margin-left: auto; margin-right: auto; line-height: 1.6; }
.onboard-steps {
  display: flex; gap: 16px; justify-content: center; flex-wrap: wrap;
  max-width: 700px; margin: 0 auto;
}
.onboard-step {
  background: var(--bg3); border: 1px solid var(--border);
  border-radius: 14px; padding: 20px;
  width: 200px; text-align: left;
}
.onboard-step .num {
  font-size: 10px; font-weight: 700; color: var(--accent);
  background: rgba(129,140,248,.1); padding: 3px 8px;
  border-radius: 4px; display: inline-block; margin-bottom: 8px;
}
.onboard-step .step-title { font-size: 13px; font-weight: 600; margin-bottom: 4px; color: var(--text); }
.onboard-step .step-desc { font-size: 11px; color: var(--text3); line-height: 1.5; }

/* === TOOLTIP === */
.tooltip {
  position: relative; cursor: help;
}
.tooltip::after {
  content: attr(data-tip);
  position: absolute; bottom: calc(100% + 6px); left: 50%;
  transform: translateX(-50%);
  background: var(--bg2); color: var(--text);
  font-size: 11px; padding: 6px 10px;
  border-radius: 6px; white-space: nowrap;
  border: 1px solid var(--border2);
  box-shadow: var(--shadow2);
  opacity: 0; visibility: hidden;
  transition: all .2s; pointer-events: none; z-index: 50;
}
.tooltip:hover::after { opacity: 1; visibility: visible; }

/* === RESPONSIVE === */
@media (max-width: 768px) {
  .hdr { padding: 12px 14px 0; }
  .hdr-title { font-size: 15px; }
  .ct { padding: 14px; }
  .kpi-grid { grid-template-columns: repeat(2, 1fr); gap: 8px; }
  .kpi { padding: 12px; }
  .kpi-value { font-size: 18px; }
  .chart-row { grid-template-columns: 1fr; }
  .forecast-grid { grid-template-columns: 1fr; }
  .tab-btn { padding: 10px 10px; font-size: 12px; }
  .upload-bar { padding: 8px 14px; }
  .onboard-steps { flex-direction: column; align-items: center; }
  .card { padding: 14px; }
  table { font-size: 11px; }
  thead th, tbody td { padding: 7px 8px; }
}
@media (max-width: 480px) {
  .kpi-grid { grid-template-columns: 1fr 1fr; gap: 6px; }
  .kpi-value { font-size: 16px; }
  .hdr-actions button span.hide-m { display: none; }
  .tabs { overflow-x: auto; }
}

/* Animations */
@keyframes fadeIn { from { opacity: 0; transform: translateY(8px); } to { opacity: 1; transform: translateY(0); } }
.fade-in { animation: fadeIn .4s ease-out; }
.kpi { animation: fadeIn .4s ease-out both; }
.kpi:nth-child(2) { animation-delay: .05s; }
.kpi:nth-child(3) { animation-delay: .1s; }
.kpi:nth-child(4) { animation-delay: .15s; }
.kpi:nth-child(5) { animation-delay: .2s; }
.kpi:nth-child(6) { animation-delay: .25s; }

/* Loading spinner */
.spinner {
  display: inline-block; width: 14px; height: 14px;
  border: 2px solid var(--border); border-top-color: var(--accent);
  border-radius: 50%; animation: spin .6s linear infinite;
}
@keyframes spin { to { transform: rotate(360deg); } }

/* Forecast decomposition */
.fc-decomp {
  margin-top: 12px; padding-top: 12px;
  border-top: 1px solid rgba(255,255,255,.05);
}
.fc-decomp-row {
  display: flex; justify-content: space-between;
  font-size: 11px; padding: 3px 0;
}
.fc-decomp-row .dl { color: var(--text3); }
.fc-decomp-row .dv { color: var(--text2); font-weight: 500; }
</style>
</head>
<body>

<!-- HEADER -->
<div class="hdr">
  <div class="hdr-top">
    <div>
      <div class="hdr-title">자동차보험 실적 대시보드</div>
      <div class="hdr-sub" id="hdr-sub">데이터를 업로드하면 실적 현황을 확인할 수 있습니다</div>
    </div>
    <div class="hdr-actions">
      <button onclick="showTokenModal()" title="GitHub 토큰 설정">🔑 <span class="hide-m">토큰</span></button>
      <button onclick="handleExportJSON()" title="데이터 백업">💾 <span class="hide-m">백업</span></button>
    </div>
  </div>
  <div class="nav-row">
    <div class="month-nav" id="month-nav" style="visibility:hidden">
      <button onclick="navMonth(-1)">◀</button>
      <span class="cur-month" id="cur-month"></span>
      <button onclick="navMonth(1)">▶</button>
      <button class="btn-latest" onclick="navLatest()">최신</button>
    </div>
    <div class="tabs" id="tabs">
      <button class="tab-btn active" data-tab="monthly">월별현황</button>
      <button class="tab-btn" data-tab="daily">일별현황</button>
      <button class="tab-btn" data-tab="channel">채널분석</button>
      <button class="tab-btn" data-tab="forecast">예측</button>
      <button class="tab-btn" data-tab="alerts">이상감지</button>
    </div>
  </div>
</div>

<!-- UPLOAD BAR -->
<div class="upload-bar">
  <button class="upload-btn" onclick="document.getElementById('upload-input').click()">
    📂 엑셀 업로드
  </button>
  <input type="file" id="upload-input" accept=".xlsx,.xls" onchange="handleUpload(event)">
  <span id="upload-status">엑셀 파일(.xlsx)을 업로드하세요</span>
  <div class="data-badges" id="data-badges"></div>
</div>

<!-- TOKEN MODAL -->

// ===== ADVANCED FORECASTING ENGINE =====

// Calculate linear trend from data points
function calcTrend(values){
  const n=values.length;
  if(n<3) return {slope:0, intercept:values[n-1]||0, r2:0};
  let sx=0,sy=0,sxy=0,sx2=0;
  for(let i=0;i<n;i++){
    sx+=i; sy+=values[i]; sxy+=i*values[i]; sx2+=i*i;
  }
  const slope=(n*sxy-sx*sy)/(n*sx2-sx*sx);
  const intercept=(sy-slope*sx)/n;
  // R-squared
  const mean=sy/n;
  let ssTot=0,ssRes=0;
  for(let i=0;i<n;i++){
    ssTot+=(values[i]-mean)**2;
    const pred=intercept+slope*i;
    ssRes+=(values[i]-pred)**2;
  }
  const r2=ssTot>0?1-ssRes/ssTot:0;
  return {slope,intercept,r2};
}

// 합병 기준일: 이 이후 데이터만 계절성 계산에 사용
const POST_MERGER_START = '2025-10';

// 최근 3개월 가중이동평균 기반 예측 (합병 이후 구조 반영)
// 계절성은 합병 이후 동월 데이터가 있을 때만 보정 수준(20%)으로 블렌딩
function getSeasonalAdjustedForecast(targetMonth, field){
  if(!M.length) return null;
  
  const tMon = parseInt(targetMonth.split('-')[1], 10);
  
  // ① 합병 이후 + 비이상치 데이터만 추출
  const postMergerValid = M.filter(r => r.m >= POST_MERGER_START && !isAnomalyMonth(r.m));
  
  // 사용할 데이터풀: 합병 이후 유효 데이터가 3개월 이상이면 그것만 사용,
  // 아니면 전체 비이상치 데이터의 최근 3개월 사용
  let recentData;
  if(postMergerValid.length >= 3){
    recentData = postMergerValid.slice(-3);
  } else {
    const allValid = M.filter(r => !isAnomalyMonth(r.m));
    recentData = allValid.slice(-3);
  }
  
  if(!recentData.length) return null;
  
  // ② 가중이동평균 (가중치 1:2:3 — 최근월이 가장 높음)
  const weights = [];
  for(let i = 0; i < recentData.length; i++){
    weights.push(i + 1); // 1, 2, 3
  }
  const weightedSum = recentData.reduce((s, r, i) => s + r[field] * weights[i], 0);
  const weightTotal = weights.reduce((s, w) => s + w, 0);
  const wma = weightedSum / weightTotal;
  
  // ③ 계절성 보정: 합병 이후 동월 데이터가 있을 때만 적용
  const postMergerSameMonth = postMergerValid.filter(r => 
    parseInt(r.m.split('-')[1], 10) === tMon
  );
  
  if(postMergerSameMonth.length > 0){
    // 합병 이후 동월 실적이 있으면, 해당 값과 WMA를 블렌딩 (동월 20%, WMA 80%)
    const sameMonthAvg = postMergerSameMonth.reduce((s, r) => s + r[field], 0) / postMergerSameMonth.length;
    const SEASON_BLEND = 0.20;
    return wma * (1 - SEASON_BLEND) + sameMonthAvg * SEASON_BLEND;
  }
  
  // 동월 데이터 없으면 WMA 그대로 사용 (계절성 미적용 = 1.0)
  return wma;
}

// Calculate dynamic renewal rates with trend
function getDynamicRenewalRates(targetYm){
  // Use RENEWAL_HISTORY to detect recent trend
  const histMonths = Object.keys(RENEWAL_HISTORY).sort();
  const normalMonths = histMonths.filter(m=>!isAnomalyMonth(m));
  
  if(normalMonths.length < 3){
    return { monthly: RENEWAL_RATE.monthly, annual: RENEWAL_RATE.annual };
  }
  
  // Get recent trend (last 6 normal months)
  const recent = normalMonths.slice(-6);
  const mRates = recent.map(m=>RENEWAL_HISTORY[m].rate_m);
  const aRates = recent.map(m=>RENEWAL_HISTORY[m].rate_a);
  
  const mTrend = calcTrend(mRates);
  const aTrend = calcTrend(aRates);
  
  // Project forward with dampening
  const baseMonth = normalMonths[normalMonths.length-1];
  const [by,bm] = baseMonth.split('-').map(Number);
  const [ty,tm] = targetYm.split('-').map(Number);
  const monthsAhead = (ty-by)*12 + (tm-bm);
  
  // Dampen projection (don't let rates diverge too far)
  const dampen = Math.exp(-0.1 * Math.max(0, monthsAhead));
  
  let projM = mRates[mRates.length-1] + mTrend.slope * monthsAhead * dampen;
  let projA = aRates[aRates.length-1] + aTrend.slope * monthsAhead * dampen;
  
  // Clamp to reasonable bounds
  projM = Math.max(0.70, Math.min(0.95, projM));
  projA = Math.max(0.60, Math.min(0.90, projA));
  
  // Blend with baseline (more weight to baseline for far-future)
  const blendWeight = Math.max(0.3, 1 - monthsAhead * 0.1);
  const finalM = projM * blendWeight + RENEWAL_RATE.monthly * (1-blendWeight);
  const finalA = projA * blendWeight + RENEWAL_RATE.annual * (1-blendWeight);
  
  return { monthly: finalM, annual: finalA };
}

// Calculate unit price (per policy premium) dynamically
function calcUnitPrice(){
  if(!D.length){
    if(!M.length) return {npPer:400000, rpPer:220000};

    const validM = M.filter(r=>!isAnomalyMonth(r.m));

    const totRP=recent.reduce((s,r)=>s+r.rp,0);
    const totNC=recent.reduce((s,r)=>s+r.nc,0);
    const totRC=recent.reduce((s,r)=>s+r.rc,0);
    return {
      npPer: totNC?totNP/totNC:400000,
      rpPer: totRC?totRP/totRC:220000
    };
  }
  
  // Use D-based: non-paydate, non-anomaly, recent data
  const validDays = D.filter(r=>{
    if(isAnomalyMonth(r.d.slice(0,7))) return false;
    if(isPaydate(r.d)) return false;
    return true;
  });
  
  // Get unique months from valid days, take last 3
  const months = [...new Set(validDays.map(r=>r.d.slice(0,7)))].sort();
  const recentMonths = months.slice(-3);
  
  const recentDays = validDays.filter(r=>recentMonths.includes(r.d.slice(0,7)));
  if(!recentDays.length){
    return {npPer:400000, rpPer:220000};
  }
  
  const totNP=recentDays.reduce((s,r)=>s+r.np,0);
  const totRP=recentDays.reduce((s,r)=>s+r.rp,0);
  const totNC=recentDays.reduce((s,r)=>s+r.nc,0);
  const totRC=recentDays.reduce((s,r)=>s+r.rc,0);
  
  return {
    npPer: totNC?totNP/totNC:400000,
    rpPer: totRC?totRP/totRC:220000
  };
}

// Calculate payment-day spike (monthly installment premium)
function calcPaymentSpike(targetYm){
  if(!D.length) return 0;
  
  const validDays = D.filter(r=>{
    if(isAnomalyMonth(r.d.slice(0,7))) return false;
    return isPaydate(r.d);
  });
  
  const months = [...new Set(validDays.map(r=>r.d.slice(0,7)))].sort();
  const recentMonths = months.slice(-3);
  
  if(!recentMonths.length) return 0;
  
  // Average per-paydate-day premium across recent months
  const monthlyPayTotals = recentMonths.map(m=>{
    const days = validDays.filter(r=>r.d.slice(0,7)===m);
    const totalPay = days.reduce((s,r)=>s+(r.np+r.rp),0);
    // Subtract estimated "normal" daily premium to isolate spike
    const normalDays = D.filter(r=>r.d.slice(0,7)===m && !isPaydate(r.d) && !isWeekend(r.d));
    const avgNormal = normalDays.length ? normalDays.reduce((s,r)=>s+(r.np+r.rp),0)/normalDays.length : 0;
    return totalPay - avgNormal * days.length; // net spike only
  });
  
  const avgSpike = monthlyPayTotals.reduce((s,v)=>s+v,0) / monthlyPayTotals.length;
  
  // Apply mild growth factor
  const baseMonth = recentMonths[recentMonths.length-1];
  const [by,bm] = baseMonth.split('-').map(Number);
  const [ty,tm] = targetYm.split('-').map(Number);
  const monthsAhead = (ty-by)*12 + (tm-bm);
  
  // Calculate actual growth rate from data if possible
  let growthRate = 1.01; // default
  if(monthlyPayTotals.length >= 2){
    const ratio = monthlyPayTotals[monthlyPayTotals.length-1] / monthlyPayTotals[0];
    if(ratio > 0){
      growthRate = Math.pow(ratio, 1/(monthlyPayTotals.length-1));
      growthRate = Math.max(0.98, Math.min(1.05, growthRate)); // clamp
    }
  }
  
  return safe(avgSpike * Math.pow(growthRate, monthsAhead));
}

// Confidence score (0-100)
function calcConfidence(targetYm, usedRenewal){
  let score = 50;
  
  // More data = higher confidence
  const dataMonths = M.filter(r=>!isAnomalyMonth(r.m)).length;
  score += Math.min(20, dataMonths * 1.2);
  
  // Daily data available = +10
  if(D.length > 0) score += 10;
  
  // Renewal arrival data = +10
  if(usedRenewal) score += 10;
  
  // Closer target = higher confidence
  const [by,bm] = (M.length?M[M.length-1].m:TODAY_YM).split('-').map(Number);
  const [ty,tm] = targetYm.split('-').map(Number);
  const dist = Math.abs((ty-by)*12+(tm-bm));
  score -= dist * 5;
  
  // Multiple years of same-month data = +bonus
  const tMon = parseInt(targetYm.split('-')[1],10);
  const sameMonthYears = M.filter(r=>!isAnomalyMonth(r.m) && parseInt(r.m.split('-')[1],10)===tMon).length;
  score += sameMonthYears * 5;
  
  return Math.max(10, Math.min(95, Math.round(score)));
}

// ===== INTRA-MONTH PREDICTION (당월 진행 중 예측) =====
// 핵심: 확정 실적 + 잔여일 예측 = 월말 예측
// 데이터가 쌓일수록 잔여일 비중이 줄어 자연스럽게 정확도 상승

function computeInMonthPrediction(targetYm){
  // 해당 월의 일별 데이터 존재 확인
  const monthDays = D.filter(r => r.d.slice(0,7) === targetYm).sort((a,b) => a.d.localeCompare(b.d));
  if(!monthDays.length) return null; // 일별 데이터 없으면 이 방식 사용 불가
  
  const lastDay = getLastDay(targetYm);
  const confirmedDays = monthDays.length;
  const lastDataDate = monthDays[monthDays.length-1].d;
  const lastDataDay = parseInt(lastDataDate.split('-')[2], 10);
  
  // 이미 월말까지 데이터가 있으면 예측이 아닌 확정
  if(lastDataDay >= lastDay){
    return null; // M 배열의 확정 데이터 사용
  }
  
  // ── 확정 실적 합산 ──
  const confirmed = {
    nc: monthDays.reduce((s,r) => s + r.nc, 0),
    rc: monthDays.reduce((s,r) => s + r.rc, 0),
    np: monthDays.reduce((s,r) => s + r.np, 0),
    rp: monthDays.reduce((s,r) => s + r.rp, 0),
  };
  
  // ── 확정 데이터에서 유형별 일평균 산출 ──
  const confirmed_biz = monthDays.filter(r => dayType(r.d) === 'biz');
  const confirmed_wk  = monthDays.filter(r => dayType(r.d) === 'weekend');
  const confirmed_pay = monthDays.filter(r => dayType(r.d) === 'pay');
  
  const avg = (arr, field) => arr.length ? arr.reduce((s,r) => s + r[field], 0) / arr.length : 0;
  
  // 당월 유형별 일평균 (당월 데이터가 가장 정확한 기준)
  let avgBiz  = { nc: avg(confirmed_biz,'nc'), rc: avg(confirmed_biz,'rc'), np: avg(confirmed_biz,'np'), rp: avg(confirmed_biz,'rp') };
  let avgWk   = { nc: avg(confirmed_wk,'nc'),  rc: avg(confirmed_wk,'rc'),  np: avg(confirmed_wk,'np'),  rp: avg(confirmed_wk,'rp') };
  let avgPay  = { nc: avg(confirmed_pay,'nc'), rc: avg(confirmed_pay,'rc'), np: avg(confirmed_pay,'np'), rp: avg(confirmed_pay,'rp') };
  
  // 당월에 해당 유형 데이터가 없으면 직전월 또는 과거 데이터에서 보완
  const fallbackAvg = (type) => {
    // 합병 이후 비이상치 최근 3개월에서 해당 유형 일평균
    const recentMonths = [...new Set(D.map(r=>r.d.slice(0,7)))]
      .filter(m => m < targetYm && m >= POST_MERGER_START && !isAnomalyMonth(m))
      .sort().slice(-3);
    if(!recentMonths.length) return null;
    const days = D.filter(r => recentMonths.includes(r.d.slice(0,7)) && dayType(r.d) === type);
    if(!days.length) return null;
    return { nc: avg(days,'nc'), rc: avg(days,'rc'), np: avg(days,'np'), rp: avg(days,'rp') };
  };
  
  if(!confirmed_biz.length) { const fb = fallbackAvg('biz'); if(fb) avgBiz = fb; }
  if(!confirmed_wk.length)  { const fb = fallbackAvg('weekend'); if(fb) avgWk = fb; }
  if(!confirmed_pay.length) { const fb = fallbackAvg('pay'); if(fb) avgPay = fb; }
  
  // ── 잔여일 유형별 카운트 ──
  let remainBiz = 0, remainWk = 0, remainPay = 0;
  const [y, m] = targetYm.split('-').map(Number);
  for(let day = lastDataDay + 1; day <= lastDay; day++){
    const ds = `${targetYm}-${String(day).padStart(2,'0')}`;
    const dt = dayType(ds);
    if(dt === 'pay') remainPay++;
    else if(dt === 'weekend') remainWk++;
    else remainBiz++;
  }
  
  // ── 잔여 예측 ──
  const remaining = {
    nc: avgBiz.nc * remainBiz + avgWk.nc * remainWk + avgPay.nc * remainPay,
    rc: avgBiz.rc * remainBiz + avgWk.rc * remainWk + avgPay.rc * remainPay,
    np: avgBiz.np * remainBiz + avgWk.np * remainWk + avgPay.np * remainPay,
    rp: avgBiz.rp * remainBiz + avgWk.rp * remainWk + avgPay.rp * remainPay,
  };
  
  // ── 갱신건수 보정: 갱신도래자 데이터가 있으면 크로스체크 ──
  let usedRenewal = false, renewalArrival = null, dynRates = null;
  const totalRC_raw = confirmed.rc + remaining.rc;
  
  if(RENEWAL_ARRIVALS[targetYm]){
    const ra = RENEWAL_ARRIVALS[targetYm];
    renewalArrival = ra;
    dynRates = getDynamicRenewalRates(targetYm);
    const arrivalRC = Math.round(ra.m * dynRates.monthly + ra.a * dynRates.annual);
    usedRenewal = true;
    
    // 진행률에 따라 블렌딩: 데이터가 많을수록 실제 추세 신뢰
    const progress = confirmedDays / lastDay; // 0~1
    // 진행률 높으면 일평균 기반 우세, 낮으면 도래자 기반 보조
    const blendedRC = totalRC_raw * progress + arrivalRC * (1 - progress);
    remaining.rc = Math.max(0, blendedRC - confirmed.rc);
  }
  
  // ── 최종 합산 ──
  const predNC = safe(Math.round(confirmed.nc + remaining.nc));
  const predRC = safe(Math.round(confirmed.rc + remaining.rc));
  const predNP = safe(confirmed.np + remaining.np);
  const predRP = safe(confirmed.rp + remaining.rp);
  const tp = predNP + predRP;
  
  // ── 신뢰도: 진행률이 직접적으로 반영 ──
  const progress = confirmedDays / lastDay;
  let confidence = Math.round(30 + progress * 65); // 30%~95%
  if(usedRenewal) confidence = Math.min(95, confidence + 5);
  confidence = Math.max(10, Math.min(95, confidence));
  
  const baseM = M.length ? M[M.length-1] : null;
  
  return {
    m: targetYm,
    nc: predNC,
    rc: predRC,
    np: predNP,
    rp: predRP,
    tp: tp,
    is_pred: true,
    pred_type: 'intra-month',
    used_renewal: usedRenewal,
    renewal_arrival: renewalArrival,
    renewal_rates: dynRates,
    base_month: baseM ? baseM.m : targetYm,
    season: {nc: 1.0, rc: 1.0},
    comp: getMonthComposition(targetYm),
    confidence: confidence,
    progress: progress,
    confirmed_days: confirmedDays,
    total_days: lastDay,
    confirmed: confirmed,
    remaining_days: { biz: remainBiz, wk: remainWk, pay: remainPay },
    breakdown: {
      npPer: predNC ? predNP/predNC : 0,
      rpPer: predRC ? predRP/predRC : 0,
      payB: 0,
      gaip: predNP + predRP,
      trend_r2: 0
    }
  };
}

// ===== FUTURE MONTH PREDICTION (미래월 예측) =====
function computeFutureMonthPrediction(targetYm){
  if(!M.length) return null;
  
  const baseM = M[M.length-1];
  
  // === 신규건수: 최근 3개월 가중이동평균 + 합병 이후 동월 보정 ===
  const ncForecast = getSeasonalAdjustedForecast(targetYm, 'nc');
  let predNC = ncForecast !== null ? ncForecast : baseM.nc;
  
  // 트렌드 보정: 합병 이후 비이상치 데이터에서만 추세 계산
  const postMergerValid = M.filter(r => r.m >= POST_MERGER_START && !isAnomalyMonth(r.m));
  if(postMergerValid.length >= 3){
    const ncValues = postMergerValid.map(r => r.nc);
    const ncTrend = calcTrend(ncValues);
    if(ncTrend.r2 > 0.4){
      const trendAdj = 1 + (ncTrend.slope / (ncValues[ncValues.length-1] || 1)) * 0.3;
      predNC *= Math.max(0.90, Math.min(1.10, trendAdj));
    }
  }
  predNC = safe(Math.round(predNC));
  
  const sNC = baseM.nc ? predNC / baseM.nc : 1.0;
  
  // === Renewal count ===
  let predRC, usedRenewal=false, renewalArrival=null;
  const dynRates = getDynamicRenewalRates(targetYm);
  
  if(RENEWAL_ARRIVALS[targetYm]){
    const ra = RENEWAL_ARRIVALS[targetYm];
    renewalArrival = ra;
    predRC = Math.round(ra.m * dynRates.monthly + ra.a * dynRates.annual);
    usedRenewal = true;
  } else {
    const rcForecast = getSeasonalAdjustedForecast(targetYm, 'rc');
    predRC = safe(Math.round(rcForecast !== null ? rcForecast : baseM.rc));
  }
  
  const sRC = baseM.rc ? predRC / baseM.rc : 1.0;
  
  // === Unit prices ===
  const {npPer, rpPer} = calcUnitPrice();
  
  // === Business premium (enrollment-based) ===
  const aNP = safe(predNC * npPer);
  const aRP = safe(predRC * rpPer);
  
  // === Payment spike (installment premium) ===
  const payB = calcPaymentSpike(targetYm);
  
  // === Total ===
  const totalNP = aNP;
  const totalRP = aRP + payB;
  const tp = totalNP + totalRP;
  
  // === Confidence ===
  const confidence = calcConfidence(targetYm, usedRenewal);
  
  return {
    m: targetYm,
    nc: predNC,
    rc: predRC,
    np: safe(totalNP),
    rp: safe(totalRP),
    tp: safe(tp),
    is_pred: true,
    pred_type: 'future',
    used_renewal: usedRenewal,
    renewal_arrival: renewalArrival,
    renewal_rates: dynRates,
    base_month: baseM.m,
    season: {nc:sNC, rc:sRC},
    comp: getMonthComposition(targetYm),
    confidence: confidence,
    progress: 0,
    confirmed_days: 0,
    total_days: getLastDay(targetYm),
    breakdown: {npPer, rpPer, payB, gaip:aNP+aRP, trend_r2: 0}
  };
}

// ===== UNIFIED PREDICTION ROUTER =====
function computePrediction(targetYm){
  if(!M.length && !D.length) return null;
  
  // 해당 월에 일별 데이터가 있지만 월이 아직 완료되지 않았으면 → 당월 진행 중 예측
  const monthDays = D.filter(r => r.d.slice(0,7) === targetYm);
  if(monthDays.length > 0){
    const lastDay = getLastDay(targetYm);
    const lastDataDay = Math.max(...monthDays.map(r => parseInt(r.d.split('-')[2], 10)));
    if(lastDataDay < lastDay){
      // 당월 데이터가 있지만 월말 미도달 → intra-month
      return computeInMonthPrediction(targetYm);
    }
    // 월말까지 데이터 있으면 M 배열에 확정치가 있을 것 → null 반환 (확정치 사용)
    return null;
  }
  
  // 일별 데이터 없는 미래월 → future prediction
  return computeFutureMonthPrediction(targetYm);
}

function generateForecasts(){
  if(!M.length && !D.length) return [];
  
  // 가장 최신 데이터 월 판단
  const allDataMonths = new Set([
    ...M.map(r => r.m),
    ...D.map(r => r.d.slice(0,7))
  ]);
  const sortedMonths = [...allDataMonths].sort();
  const latestDataMonth = sortedMonths[sortedMonths.length - 1] || TODAY_YM;
  
  const [ly, lm] = latestDataMonth.split('-').map(Number);
  const [ty, tm] = TODAY_YM.split('-').map(Number);
  
  // 예측 대상 월 결정: 당월(진행 중이면) + 미래 2~3개월
  const targetMonths = [];
  
  // 당월이 데이터에 포함되어 있고 아직 진행 중이면 당월도 예측 대상
  const currentMonthDays = D.filter(r => r.d.slice(0,7) === TODAY_YM);
  const currentMonthComplete = currentMonthDays.length > 0 && 
    Math.max(...currentMonthDays.map(r => parseInt(r.d.split('-')[2], 10))) >= getLastDay(TODAY_YM);
  
  if(currentMonthDays.length > 0 && !currentMonthComplete){
    targetMonths.push(TODAY_YM);
  }
  
  // 이후 3개월 (당월이 포함되었으면 2개월만 추가)
  const futureCount = targetMonths.length > 0 ? 2 : 3;
  let startY = ty, startM = tm + 1;
  if(startM > 12){ startY++; startM = 1; }
  
  // 당월이 미래월로만 예측되는 경우 (일별 데이터 없이 M만 있을 때)
  if(targetMonths.length === 0){
    // M의 마지막 월 이후부터
    const lastM = M.length ? M[M.length-1].m : null;
    if(lastM){
      const [lmy, lmm] = lastM.split('-').map(Number);
      if(lmy * 12 + lmm >= ty * 12 + tm){
        startY = lmy; startM = lmm + 1;
        if(startM > 12){ startY++; startM = 1; }
      } else {
        startY = ty; startM = tm;
      }
    }
  }
  
  for(let i = 0; i < futureCount; i++){
    let ny = startY, nm = startM + i;
    if(nm > 12){ ny++; nm -= 12; }
    const ym = `${ny}-${String(nm).padStart(2,'0')}`;
    if(!targetMonths.includes(ym)) targetMonths.push(ym);
  }
  
  const results = [];
  for(const ym of targetMonths){
    const pred = computePrediction(ym);
    if(pred) results.push(pred);
  }
  return results;
}

function getDisplayData(ym){
  // 1순위: M에 확정 데이터가 있고 해당 월이 완결된 경우
  const real = M.find(r => r.m === ym);
  if(real){
    // 해당 월이 완결되었는지 확인 (일별 데이터로 판단)
    const monthDays = D.filter(r => r.d.slice(0,7) === ym);
    const lastDay = getLastDay(ym);
    const isComplete = monthDays.length === 0 || // 일별 데이터 없으면 M 기준 확정
      Math.max(...monthDays.map(r => parseInt(r.d.split('-')[2], 10))) >= lastDay;
    
    if(isComplete){
      return {...real, tp: real.np + real.rp, is_pred: false};
    }
    // 진행 중인 월이면 intra-month 예측으로 전환
  }
  
  // 2순위: 예측
  const pred = computePrediction(ym);
  if(pred) return pred;
  
  // 3순위: M 데이터가 있으면 그대로 사용 (부분 확정치라도)
  if(real) return {...real, tp: real.np + real.rp, is_pred: false};
  
  return null;
}

// ===== EXCEL PARSING =====
function parseSheet(wb, wsName){
  const ws=wb.Sheets[wsName];
  if(!ws) return null;
  const rows=XLSX.utils.sheet_to_json(ws,{header:1,raw:true});
  if(rows.length<3) return null;
  
  const hdr=rows[1];
  const dates=[];
  for(let c=1;c<hdr.length;c++){
    let v=hdr[c];
    if(!v) continue;
    let ds;
    if(typeof v==='number'){
      const d=XLSX.SSF.parse_date_code(v);
      ds=`${d.y}-${String(d.m).padStart(2,'0')}-${String(d.d).padStart(2,'0')}`;
    } else {
      ds=String(v).trim();
      if(!/^\d{4}-\d{2}-\d{2}$/.test(ds)) continue;
    }
    dates.push({col:c,date:ds});
  }
  
  const rowMap={};
  for(let r=2;r<rows.length;r++){
    const name=String(rows[r][0]||'').trim();
    if(!name) continue;
    const vals={};
    for(const {col,date} of dates){
      vals[date]=Number(rows[r][col])||0;
    }
    rowMap[name]=vals;
  }
  return {dates,rowMap};
}

function handleUpload(event){
  const file=event.target.files[0];
  if(!file) return;
  
  const statusEl=document.getElementById('upload-status');
  statusEl.innerHTML='<span class="spinner"></span> 파싱 중...';
  
  const reader=new FileReader();
  reader.onload=function(e){
    try {
      const wb=XLSX.read(e.target.result,{type:'array'});
      
      const ncSheet=parseSheet(wb,'신규_건수');
      const nmSheet=parseSheet(wb,'신규_매출');
      const rcSheet=parseSheet(wb,'갱신_건수');
      const rmSheet=parseSheet(wb,'갱신_매출');
      
      if(!ncSheet||!nmSheet||!rcSheet||!rmSheet){
        statusEl.textContent='❌ 시트명 확인: 신규_건수, 신규_매출, 갱신_건수, 갱신_매출';
        return;
      }
      
      // All dates union
      const dateSet=new Set();
      [ncSheet,nmSheet,rcSheet,rmSheet].forEach(s=>s.dates.forEach(d=>dateSet.add(d.date)));
      const allDates=[...dateSet].sort();
      
      // Find total row
      const findTotal=(rm)=>{
        for(const k of Object.keys(rm)){
          if(/^(합계|총합|전체|합산)/.test(k)) return k;
        }
        return null;
      };
      const ncTotal=findTotal(ncSheet.rowMap);
      const nmTotal=findTotal(nmSheet.rowMap);
      const rcTotal=findTotal(rcSheet.rowMap);
      const rmTotal=findTotal(rmSheet.rowMap);
      
      // D (daily total)
      const newD=[];
      for(const d of allDates){
        newD.push({
          d,
          nc:(ncTotal&&ncSheet.rowMap[ncTotal]?.[d])||0,
          rc:(rcTotal&&rcSheet.rowMap[rcTotal]?.[d])||0,
          np:(nmTotal&&nmSheet.rowMap[nmTotal]?.[d])||0,
          rp:(rmTotal&&rmSheet.rowMap[rmTotal]?.[d])||0,
        });
      }
      
      // DL (daily by channel)
      const newDL=[];
      for(const d of allDates){
        for(const l of LS){
          newDL.push({
            d, l,
            nc:(ncSheet.rowMap[l]?.[d])||0,
            rc:(rcSheet.rowMap[l]?.[d])||0,
            np:(nmSheet.rowMap[l]?.[d])||0,
            rp:(rmSheet.rowMap[l]?.[d])||0,
          });
        }
      }
      
      // M (monthly from D)
      const monthMap={};
      for(const r of newD){
        const m=r.d.slice(0,7);
        if(!monthMap[m]) monthMap[m]={m,nc:0,rc:0,np:0,rp:0};
        monthMap[m].nc+=r.nc;
        monthMap[m].rc+=r.rc;
        monthMap[m].np+=r.np;
        monthMap[m].rp+=r.rp;
      }
      const newM=Object.values(monthMap).sort((a,b)=>a.m.localeCompare(b.m));
      
      // LM (monthly by channel from DL)
      const lmMap={};
      for(const r of newDL){
        const key=r.d.slice(0,7)+'|'+r.l;
        if(!lmMap[key]) lmMap[key]={m:r.d.slice(0,7),l:r.l,nc:0,rc:0,np:0,rp:0};
        lmMap[key].nc+=r.nc;
        lmMap[key].rc+=r.rc;
        lmMap[key].np+=r.np;
        lmMap[key].rp+=r.rp;
      }
      const newLM=Object.values(lmMap).sort((a,b)=>a.m.localeCompare(b.m)||LS.indexOf(a.l)-LS.indexOf(b.l));
      
      // Update globals
      M.splice(0,M.length,...newM);
      LM.splice(0,LM.length,...newLM);
      D.splice(0,D.length,...newD);
      DL.splice(0,DL.length,...newDL);
      
      buildAllMonths();
      
      // Update status
      const mCount=newM.length;
      const dCount=newD.length;
      statusEl.textContent=`✅ ${file.name} — ${mCount}개월, ${dCount}일 업로드 완료`;
      
      document.getElementById('data-badges').innerHTML=
        `<span class="badge badge-m">${mCount}개월</span>`+
        `<span class="badge badge-d">${dCount}일</span>`;
      
      saveToGitHub();
      updateNav();
      render();
      
    } catch(err){
      statusEl.textContent='❌ 파싱 오류: '+err.message;
      console.error(err);
    }
  };
  reader.readAsArrayBuffer(file);
  event.target.value='';
}

// ===== GITHUB SAVE/LOAD =====
async function saveToGitHub(){
  const token=getToken();
  if(!token){ return; }
  
  const payload=JSON.stringify({M,LM,MM,D,DL,savedAt:new Date().toISOString()});
  const content=btoa(unescape(encodeURIComponent(payload)));
  
  try {
    let sha='';
    const getRes=await fetch(GH_API,{headers:{Authorization:'token '+token}});
    if(getRes.ok){
      const data=await getRes.json();
      sha=data.sha;
    }
    
    const body={message:'Dashboard data update',content};
    if(sha) body.sha=sha;
    
    const putRes=await fetch(GH_API,{
      method:'PUT',
      headers:{Authorization:'token '+token,'Content-Type':'application/json'},
      body:JSON.stringify(body)
    });
    
    if(!putRes.ok){
      const code=putRes.status;
      if(code===401) console.error('토큰 인증 실패');
      else if(code===404) console.error('저장소 없음');
      else if(code===409) console.error('저장소 비어있음 - README.md 생성 필요');
      else console.error('저장 실패:',code);
    }
  } catch(err){
    console.error('GitHub 저장 오류:',err);
  }
}

async function loadFromGitHub(){
  const token=getToken();
  if(!token){
    document.getElementById('upload-status').textContent='🔑 토큰을 설정하면 저장된 데이터를 불러옵니다';
    return;
  }
  
  document.getElementById('upload-status').innerHTML='<span class="spinner"></span> GitHub에서 불러오는 중...';
  
  try {
    const res=await fetch(GH_API,{headers:{Authorization:'token '+token}});
    if(!res.ok){
      if(res.status===404){
        document.getElementById('upload-status').textContent='📂 저장된 데이터가 없습니다. 엑셀을 업로드하세요';
      } else {
        document.getElementById('upload-status').textContent='❌ 불러오기 실패 ('+res.status+')';
      }
      return;
    }
    
    const data=await res.json();
    const json=JSON.parse(decodeURIComponent(escape(atob(data.content.replace(/\n/g,'')))));
    
    if(json.M) M.splice(0,M.length,...json.M);
    if(json.LM) LM.splice(0,LM.length,...json.LM);
    if(json.MM) MM.splice(0,MM.length,...json.MM);
    if(json.D) D.splice(0,D.length,...json.D);
    if(json.DL) DL.splice(0,DL.length,...json.DL);
    
    buildAllMonths();
    
    const savedAt = json.savedAt ? new Date(json.savedAt).toLocaleString('ko') : '';
    document.getElementById('upload-status').textContent=`✅ 저장된 데이터 로드 완료${savedAt?' ('+savedAt+')':''}`;
    
    const mCount=M.length, dCount=D.length;
    if(mCount){
      document.getElementById('data-badges').innerHTML=
        `<span class="badge badge-m">${mCount}개월</span>`+
        (dCount?`<span class="badge badge-d">${dCount}일</span>`:'');
    }
    
    updateNav();
    render();
    
  } catch(err){
    document.getElementById('upload-status').textContent='❌ 로드 오류: '+err.message;
    console.error(err);
  }
}

  if(!e.target.classList.contains('tab-btn')) return;

  e.target.classList.add('active');
  cTab=e.target.dataset.tab;
  render();
});

// ===== CHART HELPERS =====
function destroyCharts(){
  Object.values(charts).forEach(c=>{try{c.destroy();}catch(e){}});
  charts={};
}

function createChart(id, config){
  const canvas=document.getElementById(id);
  if(!canvas) return null;
  if(charts[id]){try{charts[id].destroy();}catch(e){}}
  const ctx=canvas.getContext('2d');
  const c=new Chart(ctx, config);
  charts[id]=c;
  return c;
}

// ===== RENDER =====
function render(){
  const el=document.getElementById('ct');
  destroyCharts();
  
  if(!hasData() && cTab!=='alerts'){
    renderOnboarding(el);
    return;
  }
  
  switch(cTab){
    case 'monthly': rMonthly(el); break;
    case 'daily': rDaily(el); break;
    case 'channel': rChannel(el); break;
    case 'forecast': rForecast(el); break;
    case 'alerts': rAlerts(el); break;
  }
}

function parseNum(s){
  if(!s||s==='-') return null;
  s=String(s).replace(/,/g,'');
  if(s.includes('억')) return parseFloat(s)*1e8;
  if(s.includes('만')) return parseFloat(s)*1e4;
  return parseFloat(s);
}

function buildMonthlyTable(){
  const forecasts=generateForecasts();
  const allData=[...M.map(r=>({...r,tp:r.np+r.rp,is_pred:false})),...forecasts.map(r=>({...r,tp:r.np+r.rp}))];
  const sorted=[...allData].sort((a,b)=>b.m.localeCompare(a.m));
  
  let html=`<div class="card"><div class="card-title">월별 상세</div><div class="tbl-wrap"><table>
    <thead><tr>
      <th>월</th><th>합산매출</th><th>전월비</th><th>전년비</th><th>신규건수</th><th>갱신건수</th><th>신규매출</th><th>갱신매출</th>
    </tr></thead><tbody>`;
  
  for(const r of sorted){
    const prevIdx=allData.findIndex(x=>x.m===r.m)-1;
    const prev=prevIdx>=0?allData[prevIdx]:null;
    const pyM=r.m.replace(/^\d{4}/,String(parseInt(r.m)*1-1));
    const py=allData.find(x=>x.m===pyM);
    
    const momPct=prev?pctFmt(r.tp,prev.np+prev.rp):'';
    const yoyPct=py?pctFmt(r.tp,py.np+py.rp):'';
    const momCls=prev?pctClass(r.tp,prev.np+prev.rp):'';
    const yoyCls=py?pctClass(r.tp,py.np+py.rp):'';
    
    html+=`<tr class="${r.is_pred?'pred-row':''}">
      <td>${r.m}</td>
      <td>${fmtB(r.tp)}</td>
      <td class="tbl-${momCls}">${momPct||'-'}</td>
      <td class="tbl-${yoyCls}">${yoyPct||'-'}</td>
      <td>${fN(r.nc)}</td>
      <td>${fN(r.rc)}</td>
      <td>${fmtB(r.np)}</td>
      <td>${fmtB(r.rp)}</td>
    </tr>`;
  }
  html+='</tbody></table></div></div>';
  return html;
}

function rDaily(el){
  if(!D.length){ renderEmpty(el,'일별 데이터가 포함된 엑셀을 업로드하세요.'); return; }
  
  // Available months
  const months=[...new Set(D.map(r=>r.d.slice(0,7)))].sort().reverse();
  if(!dailySelMonth || !months.includes(dailySelMonth)) dailySelMonth=months[0];
  
  const dayData=D.filter(r=>r.d.slice(0,7)===dailySelMonth).sort((a,b)=>a.d.localeCompare(b.d));
  
  // KPIs
  const totalTP=dayData.reduce((s,r)=>s+r.np+r.rp,0);
  const totalNC=dayData.reduce((s,r)=>s+r.nc,0);
  const totalRC=dayData.reduce((s,r)=>s+r.rc,0);
  const bizDays=dayData.filter(r=>dayType(r.d)==='biz').length;
  const avgNC=bizDays?Math.round(totalNC/bizDays):0;
  
  let html='<div class="fade-in">';
  
  // Month filter
  html+='<div class="filter-btns" style="margin-bottom:14px">';
  for(const m of months){
    html+=`<button class="filter-btn${m===dailySelMonth?' active':''}" onclick="dailySelMonth='${m}';render()">${m}</button>`;
  }
  html+='</div>';
  
  // KPI cards
  html+=`<div class="kpi-grid">
    <div class="kpi kpi-primary"><div class="kpi-label">합산매출</div><div class="kpi-value">${fmtB(totalTP)}</div></div>
    <div class="kpi"><div class="kpi-label">신규건수 <span style="color:var(--text3);font-size:10px">(영업일 평균 ${fN(avgNC)})</span></div><div class="kpi-value">${fN(totalNC)}</div></div>
    <div class="kpi"><div class="kpi-label">갱신건수</div><div class="kpi-value">${fN(totalRC)}</div></div>
    <div class="kpi"><div class="kpi-label">데이터 일수</div><div class="kpi-value">${dayData.length}일</div></div>
  </div>`;
  
  // Charts
  html+=`<div class="card">
    <div class="card-title">일별 가입건수</div>
    <div class="chart-wrap chart-full"><canvas id="ch-daily-cnt"></canvas></div>
  </div>`;
  
  html+=`<div class="card">
    <div class="card-title">일별 합산매출</div>
    <div class="chart-wrap chart-full"><canvas id="ch-daily-tp"></canvas></div>
  </div>`;

  html+=`<div class="card"><div class="card-title">일별 상세</div><div class="tbl-wrap" style="max-height:500px;overflow-y:auto"><table>
    <thead><tr><th>날짜</th><th>요일</th><th>구분</th><th>신규</th><th>갱신</th><th>합계</th><th>신규매출</th><th>갱신매출</th><th>합산매출</th></tr></thead><tbody>`;
  
  for(const r of dayData){
    const dt=dayType(r.d);
    const dtLabel=dt==='pay'?'결제일':dt==='weekend'?'비영업일':'영업일';

    html+=`<tr>

  }
  html+='</tbody></table></div></div></div>';

  createChart('ch-daily-cnt',{
    type:'bar',

  createChart('ch-daily-tp',{

        borderColor:LC[i],backgroundColor:'transparent',borderWidth:2,pointRadius:1,tension:.3
      }))},
      options:{...chartDefaults,plugins:{...chartDefaults.plugins,legend:{display:true,position:'top',labels:{color:'#94a3b8',font:{size:10,family:'Noto Sans KR'},boxWidth:10,padding:8}}},scales:{...chartDefaults.scales,y:{...chartDefaults.scales.y,ticks:{...chartDefaults.scales.y.ticks,callback:v=>fN(v)}}}}
    });
  } else {
    // Single channel
    const chData=displayMonths.map(m=>{
      const r=data.find(x=>x.m===m&&x.l===selL);
      return r||{m,l:selL,nc:0,rc:0,np:0,rp:0};
    });
    
    createChart('ch-channel-tp',{
      type:'bar',
      data:{labels,datasets:[
        {label:'신규매출',data:chData.map(r=>r.np),backgroundColor:'rgba(129,140,248,.6)',borderRadius:3,barPercentage:.6,stack:'a'},
        {label:'갱신매출',data:chData.map(r=>r.rp),backgroundColor:'rgba(52,211,153,.6)',borderRadius:3,barPercentage:.6,stack:'a'},
      ]},
      options:{...chartDefaults,scales:{...chartDefaults.scales,x:{...chartDefaults.scales.x,stacked:true},y:{...chartDefaults.scales.y,stacked:true}}}
    });
    
    createChart('ch-channel-nc',{
      type:'line',
      data:{labels,datasets:[{label:'신규건수',data:chData.map(r=>r.nc),borderColor:'#818cf8',backgroundColor:'rgba(129,140,248,.1)',fill:true,borderWidth:2,pointRadius:2,tension:.3}]},
      options:{...chartDefaults,scales:{...chartDefaults.scales,y:{...chartDefaults.scales.y,ticks:{...chartDefaults.scales.y.ticks,callback:v=>fN(v)}}}}
    });
    
    createChart('ch-channel-rc',{
      type:'line',
      data:{labels,datasets:[{label:'갱신건수',data:chData.map(r=>r.rc),borderColor:'#34d399',backgroundColor:'rgba(52,211,153,.1)',fill:true,borderWidth:2,pointRadius:2,tension:.3}]},
      options:{...chartDefaults,scales:{...chartDefaults.scales,y:{...chartDefaults.scales.y,ticks:{...chartDefaults.scales.y.ticks,callback:v=>fN(v)}}}}
    });
  }
}

function buildChannelTable(){
  const curLM=LM.filter(r=>r.m===selMonth);
  if(!curLM.length) return '';
  
  const totalTP=curLM.reduce((s,r)=>s+r.np+r.rp,0);
  
  let html=`<div class="card"><div class="card-title">${selMonth} 채널별 상세</div><div class="tbl-wrap"><table>
    <thead><tr><th>채널</th><th>합산매출</th><th>비중</th><th>신규건수</th><th>갱신건수</th><th>신규매출</th><th>갱신매출</th></tr></thead><tbody>`;
  
  for(const r of curLM){
    const tp=r.np+r.rp;
    const share=totalTP?(tp/totalTP*100).toFixed(1)+'%':'-';
    html+=`<tr>
      <td>${r.l}</td>
      <td>${fmtB(tp)}</td>
      <td>${share}</td>
      <td>${fN(r.nc)}</td><td>${fN(r.rc)}</td>
      <td>${fmtB(r.np)}</td><td>${fmtB(r.rp)}</td>
    </tr>`;
  }
  html+='</tbody></table></div></div>';
  return html;
}

// ===== FORECAST TAB =====
function rForecast(el){
  if(!hasData()){ renderEmpty(el,'데이터를 업로드하면 실적 예측이 활성화됩니다.'); return; }
  
  const forecasts=generateForecasts();
  
  let html='<div class="fade-in">';
  
  // Forecast cards
  html+='<div class="forecast-grid">';
  for(const fc of forecasts){
    const prevM = M.length ? M[M.length-1] : null;
    const prevTP = prevM ? prevM.np + prevM.rp : null;
    const momPct = prevTP ? pctFmt(fc.tp, prevTP) : '';
    const momCls = prevTP ? pctClass(fc.tp, prevTP) : 'neutral';
    const confLevel = fc.confidence >= 70 ? 'high' : fc.confidence >= 45 ? 'med' : 'low';
    const confLabel = fc.confidence >= 70 ? '높음' : fc.confidence >= 45 ? '보통' : '낮음';
    
    html+=`<div class="fc-card">
      <span class="fc-method ${fc.pred_type==='intra-month'?'intra':fc.used_renewal?'renewal':'seasonal'}">${fc.pred_type==='intra-month'?`진행 중 (${fc.confirmed_days}/${fc.total_days}일)`:fc.used_renewal?'도래자 기반':'WMA 기반'}</span>
      <div class="fc-month">${fc.m}</div>
      <div class="fc-amount">${fmtB(fc.tp)}</div>
      <div class="fc-change"><span class="${momCls}">${momPct||'-'}</span> <span style="color:var(--text3);font-size:11px">vs 최신 실적월</span></div>
      <div class="fc-detail">
        <div class="fc-detail-item"><div class="dl">신규건수</div><div class="dv">${fN(fc.nc)}</div></div>
        <div class="fc-detail-item"><div class="dl">갱신건수</div><div class="dv">${fN(fc.rc)}</div></div>
        <div class="fc-detail-item"><div class="dl">신규매출</div><div class="dv">${fmtB(fc.np)}</div></div>
        <div class="fc-detail-item"><div class="dl">갱신매출</div><div class="dv">${fmtB(fc.rp)}</div></div>
      </div>
      <div class="confidence-bar">
        <span class="cb-label">신뢰도 ${confLabel} (${fc.confidence}%)</span>
        <div class="cb-track"><div class="cb-fill cb-${confLevel}" style="width:${fc.confidence}%"></div></div>
      </div>
      <div class="fc-decomp">
        ${fc.pred_type==='intra-month'?`
        <div class="fc-decomp-row"><span class="dl">예측 방식</span><span class="dv">확정 실적 + 잔여일 추정</span></div>
        <div class="fc-decomp-row"><span class="dl">데이터 진행률</span><span class="dv">${fc.confirmed_days}일 / ${fc.total_days}일 (${(fc.progress*100).toFixed(0)}%)</span></div>
        <div class="fc-decomp-row"><span class="dl">확정 신규</span><span class="dv">${fN(fc.confirmed.nc)}건 (${fmtB(fc.confirmed.np)})</span></div>
        <div class="fc-decomp-row"><span class="dl">확정 갱신</span><span class="dv">${fN(fc.confirmed.rc)}건 (${fmtB(fc.confirmed.rp)})</span></div>
        <div class="fc-decomp-row"><span class="dl">잔여일 구성</span><span class="dv">영업${fc.remaining_days.biz} / 비영업${fc.remaining_days.wk} / 결제${fc.remaining_days.pay}일</span></div>
        `:`
        <div class="fc-decomp-row"><span class="dl">예측 방식</span><span class="dv">최근 3개월 WMA${fc.season.nc !== 1.0 ? ' + 동월보정' : ''}</span></div>
        <div class="fc-decomp-row"><span class="dl">기준 데이터</span><span class="dv">합병 이후 최근 3개월</span></div>
        <div class="fc-decomp-row"><span class="dl">건당단가 (신규/갱신)</span><span class="dv">${fmt(fc.breakdown.npPer)} / ${fmt(fc.breakdown.rpPer)}</span></div>
        <div class="fc-decomp-row"><span class="dl">결제일 스파이크</span><span class="dv">${fmtB(fc.breakdown.payB)}</span></div>
        `}
        ${fc.used_renewal&&fc.renewal_arrival?`<div class="fc-decomp-row"><span class="dl">갱신도래자 (월납/연납)</span><span class="dv">${fN(fc.renewal_arrival.m)} / ${fN(fc.renewal_arrival.a)}</span></div>
        <div class="fc-decomp-row"><span class="dl">적용 갱신율 (월납/연납)</span><span class="dv">${(fc.renewal_rates.monthly*100).toFixed(1)}% / ${(fc.renewal_rates.annual*100).toFixed(1)}%</span></div>`:''}
      </div>
    </div>`;
  }
  html+='</div>';
  
  // Forecast charts
  html+=`<div class="card">
    <div class="card-title">합산매출 실적 + 예측</div>
    <div class="chart-wrap chart-full"><canvas id="ch-fc-tp"></canvas></div>
  </div>`;
  
  html+=`<div class="chart-row">
    <div class="card">
      <div class="card-title">신규건수 실적 + 예측</div>
      <div class="chart-wrap"><canvas id="ch-fc-nc"></canvas></div>
    </div>
    <div class="card">
      <div class="card-title">갱신건수 실적 + 예측</div>
      <div class="chart-wrap"><canvas id="ch-fc-rc"></canvas></div>
    </div>

  // Forecast detail table
  html+=`<div class="card"><div class="card-title">예측 상세</div><div class="tbl-wrap"><table>
    <thead><tr><th>예측월</th><th>합산매출</th><th>신규건수</th><th>갱신건수</th><th>갱신도래자</th><th>적용 갱신율</th><th>신뢰도</th><th>비고</th></tr></thead><tbody>`;
  
  for(const fc of forecasts){
    const arrivalStr = fc.renewal_arrival ? `${fN(fc.renewal_arrival.m+fc.renewal_arrival.a)}명` : '-';

    html+=`<tr class="pred-row">
      <td>${fc.m}</td>
      <td>${fmtB(fc.tp)}</td>
      <td>${fN(fc.nc)}</td>
      <td>${fN(fc.rc)}</td>
      <td>${arrivalStr}</td>
      <td>${rateStr}</td>
      <td>${fc.confidence}%</td>
      <td style="color:var(--text3)">${fc.pred_type==='intra-month'?`진행 중 (${fc.confirmed_days}/${fc.total_days}일)`:fc.used_renewal?'도래자 기반':'WMA 기반'}</td>

  html+='</tbody></table></div></div>';
  
  html+='</div>';
  el.innerHTML=html;
  
  // Charts
  const allData=[...M.slice(-12).map(r=>({...r,tp:r.np+r.rp,is_pred:false})),...forecasts.map(r=>({...r,tp:r.np+r.rp}))];
  const labels=allData.map(r=>mLabel(r.m));
  const predMask=allData.map(r=>r.is_pred);
  
  createChart('ch-fc-tp',{

      {label:'실적',data:allData.map((r,i)=>predMask[i]?null:r.tp),backgroundColor:'rgba(251,191,36,.6)',borderRadius:4,barPercentage:.6},

      {label:'추이',data:allData.map(r=>r.tp),type:'line',borderColor:'rgba(251,191,36,.8)',backgroundColor:'transparent',borderWidth:2,pointRadius:0,tension:.3,
        segment:{borderDash:ctx=>predMask[ctx.p0DataIndex]||predMask[ctx.p1DataIndex]?[5,3]:undefined}}
    ]},
    options:chartDefaults

  createChart('ch-fc-nc',{

      segment:{borderDash:ctx=>predMask[ctx.p0DataIndex]||predMask[ctx.p1DataIndex]?[5,3]:undefined}}]},

  createChart('ch-fc-rc',{
    type:'line',

// ===== ALERTS TAB =====
function rAlerts(el){
  if(!DL.length){
    el.innerHTML=`<div class="empty-state fade-in">
      <div class="icon">📂</div>
      <div class="title">이상 감지 비활성</div>
      <div class="desc">일별 데이터를 업로드하면 이상 감지가 활성화됩니다. 채널별 전일/전주 대비 급변동을 자동으로 감지합니다.</div>
    </div>`;
    return;
  }
  
  const allDates=[...new Set(DL.map(r=>r.d))].sort();
  if(allDates.length<2){
    el.innerHTML='<div class="empty-state fade-in"><div class="icon">📊</div><div class="title">데이터 부족</div><div class="desc">최소 2일 이상의 데이터가 필요합니다.</div></div>';
    return;
  }
  
  const latestDate=allDates[allDates.length-1];
  const prevDate=allDates[allDates.length-2];
  const weekAgoTarget=new Date(new Date(latestDate).getTime()-7*86400000).toISOString().slice(0,10);
  const weekAgo=allDates.reduce((best,d)=>Math.abs(new Date(d)-new Date(weekAgoTarget))<Math.abs(new Date(best)-new Date(weekAgoTarget))?d:best,allDates[0]);
  
  const alerts=[];
  
  // Check each channel + total
  const checkChannels=[...LS,'전체'];
  for(const ch of checkChannels){
    let latest, prev7, prevDay;
    
    if(ch==='전체'){
      const latD=D.find(r=>r.d===latestDate);
      const prevD=D.find(r=>r.d===prevDate);
      const wkD=D.find(r=>r.d===weekAgo);
      latest=latD?latD.nc+latD.rc:0;
      prevDay=prevD?prevD.nc+prevD.rc:0;
      prev7=wkD?wkD.nc+wkD.rc:0;
    } else {
      const latR=DL.find(r=>r.d===latestDate&&r.l===ch);
      const prevR=DL.find(r=>r.d===prevDate&&r.l===ch);
      const wkR=DL.find(r=>r.d===weekAgo&&r.l===ch);
      latest=latR?latR.nc+latR.rc:0;
      prevDay=prevR?prevR.nc+prevR.rc:0;
      prev7=wkR?wkR.nc+wkR.rc:0;
    }
    
    // Thresholds
    const dayThreshold=ch==='전체'?0.20:0.30;
    const weekThreshold=ch==='전체'?0.20:0.25;
    
    if(prevDay>0){
      const change=(latest-prevDay)/prevDay;
      if(Math.abs(change)>=dayThreshold){
        alerts.push({
          channel:ch,
          type:'전일 대비',
          change:change,
          value:latest,
          prev:prevDay,
          date:latestDate,
        });
      }
    }
    if(prev7>0 && weekAgo!==prevDate){
      const change=(latest-prev7)/prev7;
      if(Math.abs(change)>=weekThreshold){
        alerts.push({
          channel:ch,
          type:'전주 동요일 대비',
          change:change,
          value:latest,
          prev:prev7,
          date:latestDate,
        });
      }
    }
  }
  
  // Sort by absolute change
  alerts.sort((a,b)=>Math.abs(b.change)-Math.abs(a.change));
  
  let html='<div class="fade-in">';
  html+=`<div class="card-title" style="margin-bottom:16px">
    <span>이상 감지 (기준일: ${latestDate})</span>
    <span class="sub">${alerts.length}건 감지</span>
  </div>`;
  
  if(!alerts.length){
    html+='<div class="empty-state"><div class="icon">✅</div><div class="title">이상 없음</div><div class="desc">현재 감지된 이상 항목이 없습니다.</div></div>';
  } else {
    for(const a of alerts){
      const isInc=a.change>0;
      const pctStr=(a.change*100).toFixed(1);
      const suggestion=isInc
        ?`${a.channel} 가입건수가 크게 증가했습니다. 원인 파악 후 성과가 좋은 채널의 예산 확대를 검토하세요.`
        :`${a.channel} 가입건수가 크게 감소했습니다. 채널 장애나 경쟁사 프로모션 등 외부 요인을 확인하세요.`;
      
      html+=`<div class="alert-card ${isInc?'inc':'dec'}">
        <div class="alert-icon">${isInc?'▲':'▼'}</div>
        <div class="alert-body">
          <div class="alert-title">${a.channel} — ${a.type} ${isInc?'+':''}${pctStr}%</div>
          <div class="alert-desc">${suggestion}</div>
          <div class="alert-meta">${fN(a.prev)} → ${fN(a.value)} (${a.type})</div>
        </div>
      </div>`;
    }
  }
  
  html+='</div>';
  el.innerHTML=html;
}
