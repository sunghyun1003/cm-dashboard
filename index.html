<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>자동차보험 실적 대시보드</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.min.js"></script>
<style>
@import url('https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;500;600;700;800;900&display=swap');
*{margin:0;padding:0;box-sizing:border-box}
:root{
  --bg:#0a0e1a;--bg2:#0f1629;--bg3:#131832;--bg4:#1a2040;
  --border:rgba(99,102,241,.15);--border2:rgba(99,102,241,.08);
  --accent:#818cf8;--accent2:#6366f1;--accent3:rgba(99,102,241,.12);
  --green:#34d399;--red:#f87171;--yellow:#f59e0b;--cyan:#06b6d4;
  --text:#e2e8f0;--text2:#94a3b8;--text3:#64748b;--gold:#fbbf24;
}
body{font-family:'Noto Sans KR',sans-serif;background:var(--bg);color:var(--text);min-height:100vh}
.hdr{background:linear-gradient(135deg,var(--bg2),var(--bg4));padding:18px 28px 0;border-bottom:1px solid var(--border)}
.hdr-top{display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:8px;margin-bottom:10px}
.hdr-left h1{font-size:18px;font-weight:800;color:#fff}
.hdr-left .sub{font-size:11px;color:var(--text3);margin-top:2px}
.month-nav{display:flex;align-items:center;gap:8px}
.mnav-btn{background:var(--accent3);border:1px solid var(--border);color:var(--accent);border-radius:8px;padding:5px 11px;cursor:pointer;font-size:14px;font-weight:700;font-family:inherit;line-height:1;transition:.15s}
.mnav-btn:hover{background:rgba(99,102,241,.25)}
.mnav-btn:disabled{opacity:.3;cursor:default}
.mnav-label{font-size:14px;font-weight:800;color:#fff;min-width:85px;text-align:center}
.mnav-today{font-size:11px;color:var(--accent);cursor:pointer;font-weight:600;padding:4px 8px;border:1px solid var(--border);border-radius:6px;background:var(--accent3)}
.tabs{display:flex;gap:0;margin-top:12px}
.tab{padding:9px 16px;border:none;background:0;color:var(--text3);font-weight:600;font-size:13px;cursor:pointer;border-bottom:3px solid transparent;font-family:inherit;transition:.2s}
.tab.active{color:var(--accent);border-bottom-color:var(--accent)}
.tab:hover:not(.active){color:#a5b4fc}
.upload-bar{display:flex;align-items:center;gap:10px;padding:9px 28px;background:linear-gradient(135deg,#0d1225,#111827);border-bottom:1px solid rgba(99,102,241,.12)}
.upload-btn{display:inline-flex;align-items:center;gap:7px;padding:7px 16px;background:linear-gradient(135deg,#4f46e5,#6366f1);border:none;border-radius:9px;color:#fff;font-size:12px;font-weight:700;cursor:pointer;font-family:inherit;transition:.2s}
.upload-btn:hover{background:linear-gradient(135deg,#4338ca,#4f46e5)}
.upload-status{font-size:11px;color:var(--text3);flex:1}
.upload-status.ok{color:var(--green)}
.upload-status.err{color:var(--red)}
#file-input{display:none}
.data-badges{display:flex;gap:8px;flex-shrink:0}
.dbadge{font-size:10px;font-weight:600;padding:3px 8px;border-radius:6px;background:rgba(99,102,241,.1);border:1px solid var(--border);color:var(--text3)}
.dbadge.active{background:rgba(52,211,153,.12);border-color:rgba(52,211,153,.3);color:var(--green)}
.ct{padding:18px 28px;max-width:1440px;margin:0 auto}
.empty-state{display:flex;flex-direction:column;align-items:center;justify-content:center;padding:80px 20px;text-align:center;gap:16px}
.empty-icon{font-size:48px}
.empty-title{font-size:18px;font-weight:700;color:var(--text2)}
.empty-desc{font-size:13px;color:var(--text3);line-height:1.8;max-width:480px}
.kr{display:grid;grid-template-columns:repeat(auto-fit,minmax(190px,1fr));gap:10px;margin-bottom:16px}
.kp{background:linear-gradient(135deg,var(--bg3),var(--bg4));border:1px solid var(--border);border-radius:14px;padding:15px 17px}
.kp.k1{border-color:rgba(251,191,36,.35);background:linear-gradient(135deg,#150f00,#1e1900)}
.kp.k2{border-color:rgba(129,140,248,.35)}
.kp.k3{border-color:rgba(6,182,212,.35)}
.kp-top{display:flex;align-items:center;justify-content:space-between;margin-bottom:6px}
.kp-lb{font-size:11px;color:var(--text3);font-weight:600}
.kp-badge{font-size:9px;font-weight:700;padding:2px 6px;border-radius:5px}
.kp-badge.pred{background:rgba(245,158,11,.15);color:var(--yellow)}
.vl{font-size:22px;font-weight:800;line-height:1.2}
.kp.k1 .vl{color:var(--gold)}
.kp.k2 .vl{color:var(--accent)}
.kp.k3 .vl{color:var(--cyan)}
.vl .un{font-size:12px;font-weight:400;color:var(--text3);margin-left:2px}
.ch{font-size:11px;margin-top:4px;font-weight:600;display:flex;gap:10px;flex-wrap:wrap}
.up{color:var(--green)}.dn{color:var(--red)}.flat{color:var(--text3)}
.cd{background:linear-gradient(135deg,var(--bg3),var(--bg4));border:1px solid var(--border2);border-radius:14px;padding:16px;margin-bottom:12px}
.cd-head{display:flex;align-items:center;justify-content:space-between;margin-bottom:10px;flex-wrap:wrap;gap:6px}
.cd-head h3{font-size:13px;font-weight:700;display:flex;align-items:center;gap:7px}
.cd-head h3 .s{font-size:11px;color:var(--text3);font-weight:400}
.cw{position:relative;height:250px}
.cw.lg{height:300px}
table{width:100%;border-collapse:collapse;font-size:12px}
th{padding:7px 9px;text-align:left;color:var(--text3);font-weight:600;border-bottom:2px solid var(--border);font-size:11px;white-space:nowrap}
th.r,td.r{text-align:right}
td{padding:7px 9px;border-bottom:1px solid var(--border2);white-space:nowrap}
tr:hover td{background:rgba(99,102,241,.05)}
.pred-tr td{color:var(--yellow)}
.fr{display:flex;gap:5px;flex-wrap:wrap;align-items:center;margin-bottom:10px}
.fr-lbl{font-size:11px;color:var(--text3);font-weight:600}
.fb{padding:5px 11px;border-radius:7px;border:1px solid var(--border);background:0;color:var(--text2);font-weight:600;font-size:11px;cursor:pointer;font-family:inherit;transition:.15s}
.fb.ac{border-color:var(--accent);background:var(--accent3);color:var(--accent)}
.ib{background:var(--accent3);border:1px solid var(--border);border-radius:11px;padding:11px 15px;margin-bottom:12px}
.ib .tt{font-size:12px;font-weight:700;color:var(--accent);margin-bottom:4px}
.ib .ds{font-size:11px;color:var(--text2);line-height:1.7}
.ac2{background:linear-gradient(135deg,var(--bg3),var(--bg4));border:1px solid var(--border2);border-radius:13px;padding:13px;margin-bottom:8px;display:flex;flex-direction:column;gap:7px}
.ac2.inc{border-left:4px solid var(--green)}.ac2.dec{border-left:4px solid var(--red)}
.bd{padding:3px 8px;border-radius:10px;font-size:11px;font-weight:700}
.bd.inc{background:rgba(52,211,153,.15);color:var(--green)}
.bd.dec{background:rgba(248,113,113,.15);color:var(--red)}
.act{background:rgba(99,102,241,.08);border-radius:7px;padding:8px 11px;font-size:11px;color:#cbd5e1;line-height:1.5;border-left:3px solid var(--accent2)}
.metric-row{display:flex;gap:12px;font-size:11px;color:var(--text2);flex-wrap:wrap}
.metric-row strong{color:var(--text)}
.g2{display:grid;grid-template-columns:1fr 1fr;gap:12px}
@media(max-width:900px){.g2{grid-template-columns:1fr}.kr{grid-template-columns:repeat(2,1fr)}}
.range-sel{display:flex;gap:4px}
.rb{padding:4px 9px;border-radius:6px;border:1px solid var(--border);background:0;color:var(--text3);font-size:10px;font-weight:600;cursor:pointer;font-family:inherit;transition:.15s}
.rb.ac{border-color:var(--accent);background:var(--accent3);color:var(--accent)}
.pred-cards{display:grid;grid-template-columns:repeat(auto-fit,minmax(155px,1fr));gap:10px;margin-bottom:14px}
.pc{background:linear-gradient(135deg,#0f1400,#1a1f00);border:1px solid rgba(245,158,11,.25);border-radius:12px;padding:14px}
.pc .lb{font-size:10px;color:var(--text3);margin-bottom:5px;font-weight:600}
.pc .val{font-size:20px;font-weight:800;color:var(--yellow)}
.pc .det{font-size:10px;color:var(--text3);margin-top:3px}
.day-badge{display:inline-block;font-size:9px;padding:1px 5px;border-radius:4px;margin-left:4px;font-weight:600}
.day-pay{background:rgba(245,158,11,.2);color:var(--yellow)}
.day-wk{background:rgba(100,116,139,.2);color:var(--text3)}
</style>
</head>
<body>
<div class="hdr">
  <div class="hdr-top">
    <div class="hdr-left">
      <h1>자동차보험 실적 대시보드</h1>
      <div class="sub" id="hdr-sub">데이터를 업로드하면 대시보드가 활성화됩니다</div>
    </div>
    <div class="month-nav" id="month-nav-wrap" style="display:none">
      <button class="mnav-btn" id="mnav-prev">&#8592;</button>
      <span class="mnav-label" id="mnav-label">-</span>
      <button class="mnav-btn" id="mnav-next">&#8594;</button>
      <button class="mnav-today" id="mnav-today">최신</button>
    </div>
  </div>
  <div class="tabs" id="tabs">
    <button class="tab active" data-tab="monthly">월별 현황</button>
    <button class="tab" data-tab="daily">일별 현황</button>
    <button class="tab" data-tab="channel">채널 분석</button>
    <button class="tab" data-tab="forecast">예측</button>
    <button class="tab" data-tab="alerts">이상 감지</button>
  </div>
</div>
<div class="upload-bar">
  <button class="upload-btn" onclick="document.getElementById('file-input').click()">📂 엑셀 파일 업로드</button>
  <input type="file" id="file-input" accept=".xlsx" onchange="handleUpload(event)">
  <div class="upload-status" id="upload-status">업로드된 파일 없음 — 엑셀 양식에 데이터 입력 후 업로드하세요</div>
  <div class="data-badges">
    <span class="dbadge" id="badge-monthly">월별 0개월</span>
    <span class="dbadge" id="badge-daily">일별 0일</span>
    <button class="upload-btn" style="background:rgba(99,102,241,.3);font-size:11px;padding:5px 10px" onclick="showTokenModal()">🔑 토큰 설정</button>
  </div>
</div>

<!-- 토큰 입력 모달 -->
<div id="token-modal" style="display:none;position:fixed;inset:0;background:rgba(0,0,0,.7);z-index:1000;align-items:center;justify-content:center">
  <div style="background:#1a2040;border:1px solid rgba(99,102,241,.3);border-radius:16px;padding:28px;width:420px;max-width:90vw">
    <div style="font-size:15px;font-weight:700;color:#fff;margin-bottom:8px">🔑 GitHub 토큰 설정</div>
    <div style="font-size:12px;color:#64748b;margin-bottom:16px;line-height:1.6">
      GitHub Personal Access Token을 입력하세요.<br>
      토큰은 이 브라우저에만 저장되며 외부로 전송되지 않습니다.
    </div>
    <input id="token-input" type="password" placeholder="ghp_xxxxxxxxxxxxxxxxxxxx"
      style="width:100%;padding:10px 14px;background:#0f1629;border:1px solid rgba(99,102,241,.3);border-radius:8px;color:#e2e8f0;font-size:13px;font-family:monospace;margin-bottom:12px"
      onkeydown="if(event.key==='Enter')saveToken()">
    <div style="display:flex;gap:8px;justify-content:flex-end">
      <button onclick="closeTokenModal()" style="padding:8px 16px;background:rgba(99,102,241,.15);border:1px solid rgba(99,102,241,.2);border-radius:8px;color:#94a3b8;font-size:12px;cursor:pointer;font-family:inherit">취소</button>
      <button onclick="saveToken()" style="padding:8px 16px;background:linear-gradient(135deg,#4f46e5,#6366f1);border:none;border-radius:8px;color:#fff;font-size:12px;font-weight:700;cursor:pointer;font-family:inherit">저장</button>
    </div>
    <div id="token-status" style="font-size:11px;color:#64748b;margin-top:10px;text-align:center"></div>
  </div>
</div>
<div class="ct" id="ct"></div>
<script>
// ── 데이터 (업로드로만 채워짐 - 하드코딩 데이터 없음)
let M=[], LM=[], MM=[], D=[], DL=[];
const LS=['오가닉','퍼포먼스','제휴','비교추천 플랫폼','채널 시너지'];
const LC=['#818cf8','#34d399','#f59e0b','#f87171','#06b6d4'];

// ── 특수 구간 정의 (예측 계산 로직용 - UI 미표시)
const ANOMALY_PERIODS={
  mkt_min:{months:['2024-11','2024-12','2025-01','2025-02','2025-03','2025-04'],label:'마케팅 최소화'},
  merger: {months:['2025-10','2025-11','2025-12','2026-01','2026-02'],label:'합병 불안정'},
};
function isAnomalyMonth(m){return Object.values(ANOMALY_PERIODS).some(p=>p.months.includes(m));}

// ── 날짜 유틸
const TODAY_YM=(()=>{const t=new Date();return t.getFullYear()+'-'+String(t.getMonth()+1).padStart(2,'0');})();
const YESTERDAY=(()=>{const t=new Date();t.setDate(t.getDate()-1);return t.toISOString().substring(0,10);})();

function getLastDay(ym){const[y,m]=ym.split('-').map(Number);return new Date(y,m,0).getDate();}
function isWeekend(d){return[0,6].includes(new Date(d).getDay());}
function isPaydate(d){const day=parseInt(d.split('-')[2]);const last=getLastDay(d.substring(0,7));return day===10||day===20||day===last;}
function dayType(d){if(isPaydate(d))return'pay';if(isWeekend(d))return'weekend';return'biz';}
function getMonthComposition(ym){const last=getLastDay(ym);let biz=0,wk=0,pay=0;for(let d=1;d<=last;d++){const ds=`${ym}-${String(d).padStart(2,'0')}`;const t=dayType(ds);if(t==='pay')pay++;else if(t==='weekend')wk++;else biz++;}return{biz,wk,pay};}

// ── 데이터 접근
function getMonthData(ym){return M.find(r=>r.m===ym);}
function getLMData(ym){return LM.filter(r=>r.m===ym);}
function getMMData(ym){return MM.filter(r=>r.m===ym);}
function hasData(){return M.length>0;}

// ── 포맷
const fmt=n=>{if(n==null)return'-';const a=Math.abs(n);if(a>=1e12)return(n/1e12).toFixed(2)+'조';if(a>=1e8)return(n/1e8).toFixed(1)+'억';if(a>=1e4)return(n/1e4).toFixed(0)+'만';return n.toLocaleString();};
const fN=n=>n!=null?Math.round(n).toLocaleString():'-';
const pct=(a,b)=>b?((a/b-1)*100).toFixed(1):'-';
const pctFmt=(a,b)=>{if(!b)return'';const v=(a/b-1)*100;return(v>=0?'+':'')+v.toFixed(1)+'%';};
const mLabel=m=>m?m.substring(2):'';

// ── getDisplayData
function getDisplayData(ym){
  const real=getMonthData(ym);
  if(real)return{...real,isPred:false};
  if(M.length===0)return null;
  const pred=computePrediction(ym);
  if(!pred)return null;
  return{m:ym,nc:pred.nc,rc:pred.rc,np:pred.np,rp:pred.rp,tp:pred.tp||(pred.np+pred.rp),isPred:true};
}

// ── KPI 카드
function kpiCard(klass,label,value,unit,mom,yoy,isPred){
  const mS=mom&&mom!=='-'?`<span class="${parseFloat(mom)>=0?'up':'dn'}">${parseFloat(mom)>=0?'▲':'▼'} ${Math.abs(parseFloat(mom))}% 전월</span>`:'';
  const yS=yoy&&yoy!=='-'?`<span class="${parseFloat(yoy)>=0?'up':'dn'}">${parseFloat(yoy)>=0?'▲':'▼'} ${Math.abs(parseFloat(yoy))}% 전년</span>`:'';
  const pb=isPred?'<span class="kp-badge pred">예측</span>':'';
  return`<div class="kp ${klass}"><div class="kp-top"><div class="kp-lb">${label}</div>${pb}</div><div class="vl">${value}<span class="un">${unit}</span></div><div class="ch">${mS}${yS}</div></div>`;
}

// ── 차트 옵션
function chartOpts({stacked=false,yFmt=false}={}){
  return{responsive:true,maintainAspectRatio:false,
    plugins:{legend:{labels:{color:'#94a3b8',font:{size:10}}},tooltip:{callbacks:yFmt?{label:c=>`${c.dataset.label}: ${fmt(c.raw)}`}:{}}},
    scales:{x:{stacked,ticks:{color:'#64748b',font:{size:9}},grid:{color:'rgba(99,102,241,.05)'}},
            y:{stacked,ticks:{color:'#64748b',font:{size:9},callback:yFmt?v=>fmt(v):undefined},grid:{color:'rgba(99,102,241,.05)'}}}};
}

// ── 범위 버튼
function buildRangeBtn(id,values,cur,onChange){
  const el=document.getElementById(id);if(!el)return;
  el.innerHTML=values.map(v=>`<button class="rb${cur===v?' ac':''}" onclick="(${onChange.toString()})(${v})">${v===0?'전체':v+'개월'}</button>`).join('');
}

// ── 빈 상태
function renderEmpty(el,msg){
  el.innerHTML=`<div class="empty-state"><div class="empty-icon">📂</div><div class="empty-title">데이터 없음</div><div class="empty-desc">${msg||'엑셀 파일을 업로드하면 데이터가 표시됩니다'}</div></div>`;
}

// ── 상태 변수
let ALL_MONTHS=[];
let selMonth=TODAY_YM;
let cTab='monthly';
let charts={};
let cRange=12;
let selL='전체';

// ── buildAllMonths
function buildAllMonths(){
  if(M.length===0)return[];
  const months=[...M.map(r=>r.m)];
  const last=months[months.length-1];
  const[ly,lm]=last.split('-').map(Number);
  let[cy,cm]=[ly,lm];
  for(let i=0;i<18;i++){
    cm++;if(cm>12){cm=1;cy++;}
    const ym=cy+'-'+String(cm).padStart(2,'0');
    if(!months.includes(ym))months.push(ym);
    if(ym>=TODAY_YM){
      let[ay,am]=[cy,cm];
      for(let j=0;j<2;j++){am++;if(am>12){am=1;ay++;}months.push(ay+'-'+String(am).padStart(2,'0'));}
      break;
    }
  }
  return[...new Set(months)].sort();
}

function dc(){Object.values(charts).forEach(c=>{try{c.destroy();}catch(e){}});charts={};}

// ── 네비게이터
function updateNav(){
  if(!hasData()){
    document.getElementById('month-nav-wrap').style.display='none';
    document.getElementById('hdr-sub').textContent='데이터를 업로드하면 대시보드가 활성화됩니다';
    return;
  }
  document.getElementById('month-nav-wrap').style.display='flex';
  document.getElementById('mnav-label').textContent=selMonth;
  const idx=ALL_MONTHS.indexOf(selMonth);
  document.getElementById('mnav-prev').disabled=idx<=0;
  const[ty,tm]=TODAY_YM.split('-').map(Number);
  let[ay,am]=[ty,tm+2];if(am>12){am-=12;ay++;}
  const maxYm=ay+'-'+String(am).padStart(2,'0');
  document.getElementById('mnav-next').disabled=selMonth>=maxYm||idx>=ALL_MONTHS.length-1;
  const isPred=!getMonthData(selMonth);
  document.getElementById('hdr-sub').textContent=
    `기준: ${selMonth.replace('-','년 ')}월 | 최신실적: ${YESTERDAY} | ${isPred?'예측':'실데이터'}`;
}
document.getElementById('mnav-prev').onclick=()=>{const idx=ALL_MONTHS.indexOf(selMonth);if(idx>0){selMonth=ALL_MONTHS[idx-1];updateNav();render();}};
document.getElementById('mnav-next').onclick=()=>{const idx=ALL_MONTHS.indexOf(selMonth);if(idx<ALL_MONTHS.length-1){selMonth=ALL_MONTHS[idx+1];updateNav();render();}};
document.getElementById('mnav-today').onclick=()=>{selMonth=TODAY_YM;updateNav();render();};
document.getElementById('tabs').addEventListener('click',e=>{
  if(!e.target.classList.contains('tab'))return;
  document.querySelectorAll('.tab').forEach(t=>t.classList.remove('active'));
  e.target.classList.add('active');cTab=e.target.dataset.tab;render();
});

// ══════════════════════════════════════════════
//  엑셀 업로드 & 파싱
// ══════════════════════════════════════════════
function handleUpload(event) {
  const file = event.target.files[0];
  if (!file) return;
  const reader = new FileReader();
  reader.onload = function(e) {
    try {
      const wb = XLSX.read(e.target.result, {type:'binary', cellDates:false});

      function parseSheet(wsName) {
        const ws = wb.Sheets[wsName];
        if (!ws) return null;
        const raw = XLSX.utils.sheet_to_json(ws, {header:1, defval:0, raw:true});
        if (raw.length < 2) return null;
        const headerRow = raw[1];
        const dates = [];
        for (let ci=1; ci<headerRow.length; ci++) {
          const v = headerRow[ci];
          if (!v) continue;
          let dstr = '';
          if (typeof v === 'string' && v.match(/\d{4}-\d{2}-\d{2}/)) {
            dstr = v.substring(0,10);
          } else if (typeof v === 'number') {
            const d = new Date(Math.round((v-25569)*86400*1000));
            dstr = d.toISOString().substring(0,10);
          } else if (v instanceof Date) {
            dstr = v.toISOString().substring(0,10);
          }
          if (dstr) dates.push({col:ci, date:dstr});
        }
        const rowMap = {};
        for (let ri=2; ri<raw.length; ri++) {
          const row = raw[ri];
          const name = String(row[0]||'').trim();
          if (!name || name==='구분') continue;
          rowMap[name] = {};
          dates.forEach(({col, date}) => {
            rowMap[name][date] = Number(row[col])||0;
          });
        }
        return {dates, rowMap};
      }

      const ncSheet = parseSheet('신규_건수');
      const nmSheet = parseSheet('신규_매출');
      const rcSheet = parseSheet('갱신_건수');
      const rmSheet = parseSheet('갱신_매출');

      if (!ncSheet) throw new Error('신규_건수 시트를 찾을 수 없습니다');

      // ── 날짜 목록
      const allDates = [...new Set([
        ...(ncSheet?.dates||[]).map(d=>d.date),
        ...(rcSheet?.dates||[]).map(d=>d.date),
      ])].sort();

      // ── 월별 합산 계산 (D → M, LM 생성)
      const monthSet = [...new Set(allDates.map(d=>d.substring(0,7)))].sort();
      const LS_ORDER = ['오가닉','퍼포먼스','제휴','비교추천 플랫폼','채널 시너지'];
      const newM = [], newLM = [];

      monthSet.forEach(ym => {
        const days = allDates.filter(d=>d.startsWith(ym));
        const sum = (sheet, key) => days.reduce((s,dt)=>s+(sheet?.rowMap?.[key]?.[dt]||0), 0);

        // 월별 합계 (M)
        const nc = sum(ncSheet,'합계') || sum(ncSheet,'총합');
        const rc = sum(rcSheet,'총합') || sum(rcSheet,'합계');
        const np = sum(nmSheet,'합계');
        const rp = sum(rmSheet,'합계');
        if (nc+rc+np+rp > 0) newM.push({m:ym, nc, rc, np, rp});

        // 월별 대분류 (LM)
        LS_ORDER.forEach(l => {
          const lnc = sum(ncSheet, l);
          const lrc = sum(rcSheet, l);
          const lnp = sum(nmSheet, l);
          const lrp = sum(rmSheet, l);
          newLM.push({m:ym, l, nc:lnc, rc:lrc, np:lnp, rp:lrp});
        });
      });

      // ── 일별 합계 (D) & 일별 대분류 (DL)
      const newD = allDates.map(dt => ({
        d:dt,
        nc: ncSheet?.rowMap?.['합계']?.[dt] || ncSheet?.rowMap?.['총합']?.[dt] || 0,
        rc: rcSheet?.rowMap?.['총합']?.[dt] || rcSheet?.rowMap?.['합계']?.[dt] || 0,
        np: nmSheet?.rowMap?.['합계']?.[dt] || 0,
        rp: rmSheet?.rowMap?.['합계']?.[dt] || 0,
      }));
      const newDL = [];
      allDates.forEach(dt => {
        LS_ORDER.forEach(l => {
          newDL.push({d:dt, l,
            nc: ncSheet?.rowMap?.[l]?.[dt]||0,
            rc: rcSheet?.rowMap?.[l]?.[dt]||0,
            np: nmSheet?.rowMap?.[l]?.[dt]||0,
            rp: rmSheet?.rowMap?.[l]?.[dt]||0,
          });
        });
      });

      // ── 전역 변수 갱신
      M.splice(0, M.length, ...newM);
      LM.splice(0, LM.length, ...newLM);
      D.splice(0, D.length, ...newD);
      DL.splice(0, DL.length, ...newDL);

      // ── ALL_MONTHS 재빌드
      ALL_MONTHS.splice(0, ALL_MONTHS.length, ...buildAllMonths());

      // ── selMonth: 데이터 최신월 또는 오늘 월
      const latestDataYm = newM.length > 0 ? newM[newM.length-1].m : null;
      if (latestDataYm && latestDataYm >= TODAY_YM) {
        selMonth = TODAY_YM;
      } else if (latestDataYm) {
        selMonth = TODAY_YM;
      }

      // ── UI 갱신
      const dr = allDates.length>0 ? `${allDates[0]} ~ ${allDates[allDates.length-1]}` : '-';
      document.getElementById('upload-status').textContent =
        `✅ ${file.name} — ${dr} | 월별 ${newM.length}개월 / 일별 ${newD.length}일`;
      document.getElementById('upload-status').className = 'upload-status ok';
      document.getElementById('badge-monthly').textContent = `월별 ${newM.length}개월`;
      document.getElementById('badge-monthly').className = newM.length>0 ? 'dbadge active' : 'dbadge';
      document.getElementById('badge-daily').textContent = `일별 ${newD.length}일`;
      document.getElementById('badge-daily').className = newD.length>0 ? 'dbadge active' : 'dbadge';

      // GitHub에 데이터 저장
      saveToGitHub();

      updateNav();
      render();

    } catch(err) {
      document.getElementById('upload-status').textContent = '❌ 오류: ' + err.message;
      document.getElementById('upload-status').className = 'upload-status err';
      console.error(err);
    }
  };
  reader.readAsBinaryString(file);
}

// ══ 예측 로직 (보존) ══
function computePrediction(targetYm){
  // ── 예측 구조: 합산매출 = [A] 가입기반 매출 + [B] 월납 분납 매출
  // ── 건수 예측: 3월 실적 × 계절성(정상구간 2023~2024 동일월/3월 비율)
  // ── 매출 A: 예측 건수 × 비결제일 건당 단가(2~3월 평균)
  // ── 매출 B: 결제일 스파이크 추세(2~3월 평균, 이후 +1%/월)

  const baseM = M[M.length-1]; // 2026-03
  const [ty, tm] = targetYm.split('-').map(Number);
  const baseMonth = parseInt(baseM.m.split('-')[1]); // 3

  // ── 1. 계절성 (2023,2024 기준월→예측월 비율)
  let r_nc=[], r_rc=[];
  ['2023','2024'].forEach(y=>{
    const bk=`${y}-${String(baseMonth).padStart(2,'0')}`;
    const tk=`${y}-${String(tm).padStart(2,'0')}`;
    const bm=M.find(r=>r.m===bk), tgm=M.find(r=>r.m===tk);
    if(bm&&tgm){ r_nc.push(tgm.nc/bm.nc); r_rc.push(tgm.rc/bm.rc); }
  });
  const avg=a=>a.reduce((s,v)=>s+v,0)/a.length;
  const sNC=avg(r_nc), sRC=avg(r_rc);

  // ── 2. 건수 예측
  const predNC = Math.round(baseM.nc * sNC);
  const predRC = Math.round(baseM.rc * sRC);

  // ── 3. 비결제일 건당 단가 (2~3월 통합 평균)
  const baseMonths=['2026-02','2026-03'];
  let sumNP=0, sumRP=0, sumNC=0, sumRC=0;
  D.forEach(r=>{
    if(!baseMonths.some(bm=>r.d.startsWith(bm))) return;
    const day=parseInt(r.d.split('-')[2]);
    const ym=r.d.substring(0,7);
    const y2=parseInt(ym.split('-')[0]), m2=parseInt(ym.split('-')[1]);
    const last=new Date(y2,m2,0).getDate();
    if(day===10||day===20||day===last) return; // 결제일 제외
    sumNP+=r.np; sumRP+=r.rp;
  });
  // 비결제일 건당 = (비결제일 총매출) / (해당월 총건수)
  baseMonths.forEach(bm=>{
    const rm=M.find(r=>r.m===bm);
    if(rm){ sumNC+=rm.nc; sumRC+=rm.rc; }
  });
  const npPer = sumNC>0 ? sumNP/sumNC : 0;
  const rpPer = sumRC>0 ? sumRP/sumRC : 0;

  // ── 4. 가입 기반 매출 A
  const aNP = predNC * npPer;
  const aRP = predRC * rpPer;

  // ── 5. 월납 분납 매출 B (결제일 스파이크)
  // 2~3월 평균을 기준으로, 예측월은 +1%/월 증가 적용
  let payTotal23=0;
  ['2026-02','2026-03'].forEach(bm=>{
    D.forEach(r=>{
      if(!r.d.startsWith(bm)) return;
      const day=parseInt(r.d.split('-')[2]);
      const y2=parseInt(bm.split('-')[0]), m2=parseInt(bm.split('-')[1]);
      const last=new Date(y2,m2,0).getDate();
      if(day===10||day===20||day===last) payTotal23+=r.np+r.rp;
    });
  });
  const payBase = payTotal23 / 2; // 2~3월 평균
  const monthsAhead = tm - baseMonth; // 기준월(3)로부터 몇 달 후
  const payB = payBase * Math.pow(1.01, monthsAhead);

  // ── 6. 예측월 구성
  const comp = getMonthComposition(targetYm);

  return {
    m: targetYm, fc: true,
    nc: predNC,
    rc: predRC,
    np: Math.round(aNP + payB * 0.45), // np 비율 (결제일 신규:갱신 ≈ 45:55 기준)
    rp: Math.round(aRP + payB * 0.55),
    tp: Math.round(aNP + aRP + payB),
    comp,
    season: {nc:sNC, rc:sRC},
    breakdown: {
      ncPer: Math.round(npPer/1e4), rcPer: Math.round(rpPer/1e4),
      payB: Math.round(payB/1e8*10)/10,
      gaipBase: Math.round((aNP+aRP)/1e8*10)/10
    }
  };
}

function generateForecasts(){
  // 예측 시작: 오늘 월 (전일까지 실적 → 오늘 당월이 예측 대상)
  const startYm = TODAY_YM;
  // 오늘 월부터 3개월
  const [sy, sm] = startYm.split('-').map(Number);
  const months = [];
  for(let i=0; i<3; i++){
    let nm = sm+i, ny = sy;
    if(nm>12){ nm-=12; ny++; }
    months.push(ny+'-'+String(nm).padStart(2,'0'));
  }
  return months.map(mo=>computePrediction(mo));
}

// ══ 이상 감지 ══
function detectAlerts(){
  const alerts=[];
  if(!D||D.length===0) return alerts;

  const dates=[...new Set(D.map(d=>d.d))].sort();
  if(dates.length<2) return alerts;

  // ── 오늘 기준 최신 실적일
  const latestDate=dates[dates.length-1];
  const latestD=D.find(r=>r.d===latestDate)||{nc:0,rc:0,np:0,rp:0};
  const latestTC=latestD.nc+latestD.rc;
  const latestTP=latestD.np+latestD.rp;

  // ── 전일
  const prevDate=dates[dates.length-2];
  const prevD=D.find(r=>r.d===prevDate)||{nc:0,rc:0,np:0,rp:0};
  const prevTC=prevD.nc+prevD.rc;

  // ── 전주 동요일 (7일전)
  const d7Date=dates[dates.length-8]||null;
  const d7=d7Date?D.find(r=>r.d===d7Date):null;
  const d7TC=d7?d7.nc+d7.rc:0;

  // ── 최근 7일 평균
  const last7=dates.slice(-7);
  const avg7=(arr,key)=>arr.reduce((s,d)=>{const r=D.find(x=>x.d===d);return s+(r?r[key]:0);},0)/arr.length;
  const avg7tc=last7.map(d=>D.find(r=>r.d===d)).filter(Boolean).reduce((s,r)=>s+r.nc+r.rc,0)/last7.length;

  // ── 직전 7일 평균 (8~14일전)
  const prev7=dates.slice(-14,-7);
  const prev7tc=prev7.length?prev7.map(d=>D.find(r=>r.d===d)).filter(Boolean).reduce((s,r)=>s+r.nc+r.rc,0)/prev7.length:0;

  // ── 채널별 전일/전주 비교
  const latestDL=DL.filter(r=>r.d===latestDate);
  const prevDL=DL.filter(r=>r.d===prevDate);
  const d7DL=d7Date?DL.filter(r=>r.d===d7Date):[];

  const LS_ALL=['오가닉','퍼포먼스','제휴','비교추천 플랫폼','채널 시너지'];

  LS_ALL.forEach(ch=>{
    const cur=latestDL.find(r=>r.l===ch)||{nc:0,rc:0};
    const prv=prevDL.find(r=>r.l===ch)||{nc:0,rc:0};
    const wk=d7DL.find(r=>r.l===ch)||{nc:0,rc:0};
    const curTC=cur.nc+cur.rc;
    const prvTC=prv.nc+prv.rc;
    const wkTC=wk.nc+wk.rc;

    // 전일 대비 ±30% 이상
    if(prvTC>0){
      const rate=((curTC-prvTC)/prvTC)*100;
      if(Math.abs(rate)>=30){
        alerts.push({
          type:'전일대비', ch, dir:rate>0?'inc':'dec',
          rate:rate.toFixed(1),
          curV:curTC.toFixed(0), prvV:prvTC.toFixed(0),
          curDate:latestDate, prvDate:prevDate,
          act:rate>0?`${ch} 전일 대비 급증. 이상 트래픽 또는 이벤트 효과 확인 필요.`
                   :`${ch} 전일 대비 급감. 광고 소진·플랫폼 오류 즉시 점검.`
        });
      }
    }

    // 전주 동요일 대비 ±25% 이상
    if(wkTC>0){
      const rate=((curTC-wkTC)/wkTC)*100;
      if(Math.abs(rate)>=25){
        alerts.push({
          type:'전주대비', ch, dir:rate>0?'inc':'dec',
          rate:rate.toFixed(1),
          curV:curTC.toFixed(0), prvV:wkTC.toFixed(0),
          curDate:latestDate, prvDate:d7Date,
          act:rate>0?`${ch} 전주 동요일 대비 상승. 성과 지속 여부 모니터링.`
                   :`${ch} 전주 동요일 대비 하락. 요일 패턴 이탈 — 원인 분석.`
        });
      }
    }
  });

  // ── 전체 합계 전일 대비
  if(prevTC>0){
    const rate=((latestTC-prevTC)/prevTC)*100;
    if(Math.abs(rate)>=20){
      alerts.push({
        type:'전일대비', ch:'전체합계', dir:rate>0?'inc':'dec',
        rate:rate.toFixed(1),
        curV:latestTC.toFixed(0), prvV:prevTC.toFixed(0),
        curDate:latestDate, prvDate:prevDate,
        act:rate>0?'전체 가입건수 전일 대비 급증. 전 채널 모니터링.'
                 :'전체 가입건수 전일 대비 급감. 시스템 오류 또는 광고 일제 중단 여부 확인.'
      });
    }
  }

  // 최신 날짜 순 + 변화율 절대값 내림차순
  return alerts.sort((a,b)=>Math.abs(parseFloat(b.rate))-Math.abs(parseFloat(a.rate)));
}

const GH_OWNER  = 'sunghyun1003';
const GH_REPO   = 'cm-dashboard-data';
const GH_FILE   = 'data.json';
const GH_API    = `https://api.github.com/repos/${GH_OWNER}/${GH_REPO}/contents/${GH_FILE}`;

// 토큰은 코드에 저장하지 않고 브라우저 localStorage에만 보관
function getToken() { return localStorage.getItem('gh_token') || ''; }
function setToken(t) { localStorage.setItem('gh_token', t); }

// 데이터 저장 (GitHub PUT)
async function saveToGitHub() {
  const payload = {
    M, LM, MM, D, DL,
    savedAt: new Date().toISOString()
  };
  const body = JSON.stringify(payload);
  const encoded = btoa(unescape(encodeURIComponent(body)));

  // 기존 파일 SHA 조회 (업데이트 시 필요)
  let sha = null;
  try {
    const res = await fetch(GH_API, {
      headers: {
        'Authorization': `token ${getToken()}`,
        'Accept': 'application/vnd.github.v3+json'
      }
    });
    if (res.ok) {
      const existing = await res.json();
      sha = existing.sha;
    }
  } catch(e) {}

  // 파일 저장
  const putRes = await fetch(GH_API, {
    method: 'PUT',
    headers: {
      'Authorization': `token ${getToken()}`,
      'Accept': 'application/vnd.github.v3+json',
      'Content-Type': 'application/json'
    },
    body: JSON.stringify({
      message: `데이터 업데이트 ${new Date().toLocaleDateString('ko')}`,
      content: encoded,
      ...(sha ? {sha} : {})
    })
  });

  if (putRes.ok) {
    document.getElementById('upload-status').textContent +=
      ' | ✅ GitHub 저장 완료';
  } else {
    const err = await putRes.json();
    document.getElementById('upload-status').textContent +=
      ` | ❌ GitHub 저장 실패: ${err.message}`;
  }
}

// 데이터 로드 (GitHub GET - raw)
async function loadFromGitHub() {
  const statusEl = document.getElementById('upload-status');
  statusEl.textContent = '📡 저장된 데이터 불러오는 중...';
  // 토큰 없으면 안내
  if(!getToken()){
    statusEl.textContent='🔑 토큰 설정 버튼을 클릭해 GitHub 토큰을 입력하세요';
    statusEl.className='upload-status';
    return;
  }
  try {
    // raw 콘텐츠 직접 요청
    const rawUrl = `https://raw.githubusercontent.com/${GH_OWNER}/${GH_REPO}/main/${GH_FILE}`;
    const res = await fetch(rawUrl + '?t=' + Date.now(), {
      headers: {
        'Authorization': `token ${getToken()}`,
        'Cache-Control': 'no-cache'
      }
    });

    if (!res.ok) {
      statusEl.textContent = '📂 저장된 데이터 없음 — 엑셀 파일을 업로드하세요';
      statusEl.className = 'upload-status';
      return;
    }

    const data = await res.json();

    M.splice(0,  M.length,  ...(data.M  || []));
    LM.splice(0, LM.length, ...(data.LM || []));
    MM.splice(0, MM.length, ...(data.MM || []));
    D.splice(0,  D.length,  ...(data.D  || []));
    DL.splice(0, DL.length, ...(data.DL || []));

    ALL_MONTHS.splice(0, ALL_MONTHS.length, ...buildAllMonths());
    selMonth = TODAY_YM;

    const savedAt = data.savedAt
      ? new Date(data.savedAt).toLocaleDateString('ko', {month:'long',day:'numeric',hour:'2-digit',minute:'2-digit'})
      : '알 수 없음';

    statusEl.textContent =
      `✅ 데이터 복원 완료 — 마지막 업로드: ${savedAt} | 월별 ${M.length}개월 / 일별 ${D.length}일`;
    statusEl.className = 'upload-status ok';
    document.getElementById('badge-monthly').textContent = `월별 ${M.length}개월`;
    document.getElementById('badge-monthly').className = M.length>0 ? 'dbadge active' : 'dbadge';
    document.getElementById('badge-daily').textContent = `일별 ${D.length}일`;
    document.getElementById('badge-daily').className = D.length>0 ? 'dbadge active' : 'dbadge';

    updateNav();
    render();

  } catch(err) {
    statusEl.textContent = '📂 저장된 데이터 없음 — 엑셀 파일을 업로드하세요';
    statusEl.className = 'upload-status';
  }
}


// ── 토큰 모달
function showTokenModal(){
  const modal=document.getElementById('token-modal');
  modal.style.display='flex';
  const saved=getToken();
  if(saved) document.getElementById('token-input').value=saved;
  document.getElementById('token-status').textContent=
    saved?'✅ 토큰이 저장되어 있습니다':'토큰을 입력하세요';
  setTimeout(()=>document.getElementById('token-input').focus(),50);
}
function closeTokenModal(){
  document.getElementById('token-modal').style.display='none';
}
function saveToken(){
  const t=document.getElementById('token-input').value.trim();
  if(!t){document.getElementById('token-status').textContent='❌ 토큰을 입력해주세요';return;}
  setToken(t);
  document.getElementById('token-status').textContent='✅ 저장됨';
  setTimeout(()=>{
    closeTokenModal();
    // 토큰 저장 후 데이터 로드 재시도
    loadFromGitHub();
  },600);
}
document.getElementById('token-modal').addEventListener('click',function(e){
  if(e.target===this)closeTokenModal();
});

// ══ RENDER ══
function render(){
  dc();
  const el=document.getElementById('ct');
  if(cTab==='monthly')rMonthly(el);
  else if(cTab==='daily')rDaily(el);
  else if(cTab==='channel')rChannel(el);
  else if(cTab==='forecast')rForecast(el);
  else if(cTab==='alerts')rAlerts(el);
}
// 페이지 로드 시 GitHub에서 데이터 자동 복원
loadFromGitHub();
</script>
